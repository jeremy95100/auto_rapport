        document.body.appendChild(modal);

        const closeModal = () => document.body.removeChild(modal);
        modal.querySelector("#closeTagsModal").addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });

        // Fonction pour mettre à jour le compteur et les numéros d'ordre
        const updateSelectionUI = () => {
          modal.querySelector("#selectionCount").textContent = `${selectionOrder.length} sélectionné(s)`;
          modal.querySelectorAll(".tags-media-item").forEach(item => {
            const idx = parseInt(item.getAttribute("data-media-idx"));
            const orderSpan = item.querySelector(".selection-order");
            const checkbox = item.querySelector(".media-checkbox");
            const orderIndex = selectionOrder.indexOf(idx);
            if (orderIndex >= 0) {
              orderSpan.textContent = orderIndex + 1;
              orderSpan.style.display = "inline";
              item.style.borderColor = "var(--accent)";
              item.style.background = "rgba(var(--accent-rgb), 0.05)";
              checkbox.checked = true;
            } else {
              orderSpan.style.display = "none";
              item.style.borderColor = "var(--border)";
              item.style.background = "transparent";
              checkbox.checked = false;
            }
          });
        };

        // Bouton "Tout sélectionner"
        modal.querySelector("#selectAllMedia").addEventListener("click", () => {
          selectionOrder = [];
          modal.querySelectorAll(".tags-media-item").forEach(item => {
            const idx = parseInt(item.getAttribute("data-media-idx"));
            selectionOrder.push(idx);
          });
          updateSelectionUI();
        });

        // Bouton "Tout désélectionner"
        modal.querySelector("#deselectAllMedia").addEventListener("click", () => {
          selectionOrder = [];
          updateSelectionUI();
        });

        // Charger les miniatures de prévisualisation pour les vidéos
        if (mediaType === "videos") {
          const loadVideoPreviews = async () => {
            const previewContainers = modal.querySelectorAll(".video-preview-container");
            for (const container of previewContainers) {
              const videoUrl = container.getAttribute("data-video-url");
              if (videoUrl) {
                try {
                  const resp = await fetch("/api/video-thumbnails", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ video_url: videoUrl, num_thumbnails: 1 })
                  });
                  if (resp.ok) {
                    const data = await resp.json();
                    if (data.thumbnails && data.thumbnails.length > 0) {
                      container.innerHTML = `<img src="${data.thumbnails[0]}" style="width:100%;max-height:120px;object-fit:contain;border-radius:4px;display:block;" onerror="this.parentElement.innerHTML='<div style=\\'color:var(--muted);font-size:11px;\\'>Miniature non disponible</div>'"/>`;
                    } else {
                      container.innerHTML = `<div style="color:var(--muted);font-size:11px;">Pas de miniature</div>`;
                    }
                  } else {
                    container.innerHTML = `<div style="color:var(--muted);font-size:11px;">Erreur chargement</div>`;
                  }
                } catch (err) {
                  console.error("[VIDEO] Erreur preview:", err);
                  container.innerHTML = `<div style="color:var(--muted);font-size:11px;">Erreur</div>`;
                }
              }
            }
          };
          // Charger les previews en arrière-plan
          loadVideoPreviews();
        }

        // Charger automatiquement la durée de chaque vidéo
        if (mediaType === "videos") {
          const loadVideoDurations = async () => {
            const endTimeInputs = modal.querySelectorAll(".video-end-time");
            for (const input of endTimeInputs) {
              const idx = input.getAttribute("data-idx");
              const url = input.getAttribute("data-url");
              const durationSpan = modal.querySelector(`.video-duration-info[data-idx="${idx}"]`);

              if (url) {
                try {
                  const resp = await fetch("/api/video-info", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ video_url: url })
                  });

                  if (resp.ok) {
                    const data = await resp.json();
                    // Pré-remplir le champ Fin avec la durée totale
                    input.value = data.duration_formatted;
                    input.placeholder = data.duration_formatted;
                    // Stocker la durée dans videoIntervals
                    if (!videoIntervals[idx]) videoIntervals[idx] = {};
                    videoIntervals[idx].endTime = data.duration_formatted;
                    videoIntervals[idx].maxDuration = data.duration_formatted;
                    // Afficher l'info
                    if (durationSpan) {
                      durationSpan.textContent = `Durée: ${data.duration_formatted}`;
                      durationSpan.style.color = "var(--accent)";
                    }
                  } else {
                    if (durationSpan) durationSpan.textContent = "Durée non disponible";
                  }
                } catch (err) {
                  console.error("[VIDEO] Erreur chargement durée:", err);
                  if (durationSpan) durationSpan.textContent = "Erreur chargement";
                }
              }
            }
          };
          // Charger les durées en arrière-plan
          loadVideoDurations();
        }

        // Gestion des observations
        modal.querySelectorAll(".observation-input").forEach(textarea => {
          textarea.addEventListener("input", (e) => {
            const idx = parseInt(textarea.getAttribute("data-idx"));
            observations[idx] = textarea.value;
          });
        });

        // Gestion des intervalles de temps pour les vidéos
        if (mediaType === "videos") {
          modal.querySelectorAll(".video-start-time").forEach(input => {
            input.addEventListener("input", (e) => {
              const idx = parseInt(input.getAttribute("data-idx"));
              if (!videoIntervals[idx]) videoIntervals[idx] = {};
              videoIntervals[idx].startTime = input.value;
            });
          });
          modal.querySelectorAll(".video-end-time").forEach(input => {
            input.addEventListener("input", (e) => {
              const idx = parseInt(input.getAttribute("data-idx"));
              if (!videoIntervals[idx]) videoIntervals[idx] = {};
              videoIntervals[idx].endTime = input.value;
            });
          });
        }

        // Gestion des checkboxes
        modal.querySelectorAll(".media-checkbox").forEach(checkbox => {
          checkbox.addEventListener("change", (e) => {
            e.stopPropagation();
            const idx = parseInt(checkbox.getAttribute("data-idx"));

            if (checkbox.checked) {
              // Ajouter à la liste de sélection
              if (!selectionOrder.includes(idx)) {
                selectionOrder.push(idx);
              }
            } else {
              // Retirer de la liste de sélection
              selectionOrder = selectionOrder.filter(i => i !== idx);
            }

            updateSelectionUI();
          });
        });

        // Click sur un item (toggle checkbox) - sauf sur textarea
        modal.querySelectorAll(".tags-media-item").forEach(item => {
          item.addEventListener("click", (e) => {
            // Ne pas toggler si on clique sur la checkbox ou le textarea
            if (e.target.classList.contains("media-checkbox") || e.target.classList.contains("observation-input")) return;

            const checkbox = item.querySelector(".media-checkbox");
            checkbox.checked = !checkbox.checked;
            checkbox.dispatchEvent(new Event("change"));
          });
        });

        // Bouton Valider
        modal.querySelector("#validateSelection").addEventListener("click", async () => {
          if (selectionOrder.length === 0) {
            alert("Veuillez sélectionner au moins un élément.");
            return;
          }

          // Animation de chargement INTEGREE dans le bouton (spinner + compteur).
          // S'arrete des que toutes les images/videos/audios sont inserees.
          const validateBtn = modal.querySelector("#validateSelection");
          const originalText = validateBtn.textContent;
          validateBtn.disabled = true;
          validateBtn.style.cursor = "wait";
          validateBtn.style.opacity = "0.85";
          const totalMedia = selectionOrder.length;
          let mediaLabel = "média";
          if (mediaType === "images") mediaLabel = "image";
          else if (mediaType === "videos") mediaLabel = "vidéo";
          else if (mediaType === "audios") mediaLabel = "audio";

          try {
            // Insérer les médias dans l'ordre de sélection avec métadonnées
            let processed = 0;
            for (const idx of selectionOrder) {
              processed++;
              validateBtn.innerHTML = `<span class="app-spinner small" style="border-color:#fff;border-top-color:transparent;margin-right:8px;"></span>Génération ${mediaLabel} ${processed}/${totalMedia}...`;
              // Forcer un repaint pour que le spinner soit visible avant la prochaine
              // iteration (essentiel pour les images dont l'insertion est synchrone
              // et termine en quelques ms).
              await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
              const item = modal.querySelector(`.tags-media-item[data-media-idx="${idx}"]`);
              const url = item.getAttribute("data-media-url");
              const name = item.getAttribute("data-media-name");
              const path = item.getAttribute("data-media-path");
              const date = item.getAttribute("data-media-date");
              const observation = observations[idx] || "";
              const interval = videoIntervals[idx] || null; // Pour les vidéos: {startTime, endTime}

              if (url) {
                await insertTaggedMediaWithMetadata(headingKey, mediaType, url, name, path, date, observation, interval);
              }
            }
            closeModal();
          } catch (err) {
            console.error("[TAGS] Erreur insertion:", err);
            alert("Erreur lors de l'insertion: " + err.message);
          } finally {
            validateBtn.textContent = originalText;
            validateBtn.disabled = false;
            validateBtn.style.cursor = "";
            validateBtn.style.opacity = "";
          }
        });

      } catch (err) {
        console.error("[TAGS] Erreur:", err);
        alert("Erreur: " + err.message);
      }
    }

    // Insérer un média tagué (simple, sans métadonnées)
    function insertTaggedMedia(headingKey, mediaType, url, name) {
      if (!state.headingContent[headingKey]) {
        state.headingContent[headingKey] = [];
      }

      if (mediaType === "images") {
        state.headingContent[headingKey].push({
          type: "image",
          src: url,
          width: state.imageWidthCm,
          name: name
        });
      } else {
        // Pour vidéos et audios, ajouter comme lien/référence
        state.headingContent[headingKey].push({
          type: "text",
          content: `[${mediaType === "videos" ? "Vidéo" : "Audio"}: ${name}]`
        });
      }

      renderLayout();
      renderPreview();
    }

    // Insérer un média tagué avec métadonnées (chemin, date, observations)
    // interval = {startTime: "mm:ss", endTime: "mm:ss"} pour les vidéos
    async function insertTaggedMediaWithMetadata(headingKey, mediaType, url, name, filePath, createdDate, observation, interval = null) {
      if (!state.headingContent[headingKey]) {
        state.headingContent[headingKey] = [];
      }

      if (mediaType === "images") {
        // Ajouter l'image avec caption contenant les métadonnées
        // Le caption sera positionné à droite avec les infos
        const metadataCaption = `**Chemin :** ${filePath || "Non disponible"}\n**Date de création :** ${createdDate || "Non disponible"}\n**Observations :** ${observation || "(à compléter)"}`;

        state.headingContent[headingKey].push({
          type: "image",
          src: url,
          width: state.imageWidthCm,
          name: name,
          caption: metadataCaption,
          captionPosition: "right",
          // Stocker les métadonnées séparément pour le backend
          metadata: {
            filePath: filePath || "",
            createdDate: createdDate || "",
            observation: observation || ""
          }
        });
      } else if (mediaType === "videos") {
        // Pour les vidéos, générer les miniatures
        try {
          // Préparer les données avec l'intervalle de temps si spécifié
          const requestBody = { video_url: url };
          if (interval) {
            if (interval.startTime && interval.startTime !== "00:00") {
              requestBody.start_time = interval.startTime;
            }
            if (interval.endTime && interval.endTime.trim() !== "") {
              requestBody.end_time = interval.endTime;
            }
          }
          console.log("[VIDEO] Request body:", requestBody);

          const resp = await fetch("/api/video-thumbnails", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(requestBody)
          });

          if (resp.ok) {
            const data = await resp.json();
            const thumbnails = data.thumbnails || [];
            console.log("[DEBUG VIDEO] API response:", data);
            console.log("[DEBUG VIDEO] Thumbnails:", thumbnails);
            console.log("[DEBUG VIDEO] Name:", name, "URL:", url);

            if (thumbnails.length > 0) {
              // Ajouter un bloc vidéo avec miniatures et métadonnées
              const videoBlock = {
                type: "video",
                src: url,
                name: name,
                thumbnails: thumbnails,
                metadata: {
                  filePath: filePath || "",
                  createdDate: createdDate || "",
                  observation: observation || ""
                }
              };
              console.log("[DEBUG VIDEO] Block créé:", JSON.stringify(videoBlock));
              state.headingContent[headingKey].push(videoBlock);
            } else {
              // Pas de miniatures, ajouter comme texte
              state.headingContent[headingKey].push({
                type: "text",
                content: `[Vidéo: ${name}]\nChemin : ${filePath || "Non disponible"}\nDate de création : ${createdDate || "Non disponible"}\nObservations : ${observation || "(à compléter)"}\n(Miniatures non disponibles)`
              });
            }
          } else {
            throw new Error("Erreur génération miniatures");
          }
        } catch (err) {
          console.error("[VIDEO] Erreur miniatures:", err);
          // Fallback: ajouter comme texte
          state.headingContent[headingKey].push({
            type: "text",
            content: `[Vidéo: ${name}]\nChemin : ${filePath || "Non disponible"}\nDate de création : ${createdDate || "Non disponible"}\nObservations : ${observation || "(à compléter)"}`
          });
        }
      } else {
        // Pour audios, ajouter comme texte avec métadonnées
        state.headingContent[headingKey].push({
          type: "text",
          content: `[Audio: ${name}]\nChemin : ${filePath || "Non disponible"}\nDate de création : ${createdDate || "Non disponible"}\nObservations : ${observation || "(à compléter)"}`
        });
      }

      renderLayout();
      renderPreview();
    }

    // Modal pour sélectionner une feuille Excel et ses colonnes pour créer un tableau
    async function showTableSelectionModal(headingRef, options = {}) {
      if (state.excelSheets.length === 0) {
        alert("Veuillez d'abord importer un fichier Excel.");
        return;
      }

      // Récupérer le titre du heading pour stocker dans headingContent
      const headingTitle = typeof headingRef === "number" ? state.headings[headingRef] : String(headingRef || "");
      if (!headingTitle) {
        alert("Titre cible introuvable pour l'insertion du tableau.");
        return;
      }
      const sourceTitle = options && options.sourceTitle ? String(options.sourceTitle) : "";
      const filterBySourceTitle = !!sourceTitle;
      const forceContactsSheet = !!(options && options.forceContactsSheet);
      const forceCallLogSheet = !!(options && options.forceCallLogSheet);
      const forceChatsSheet = !!(options && options.forceChatsSheet);
      const forceUserAccountsSheet = !!(options && options.forceUserAccountsSheet);
      const forceInstalledAppsSheet = !!(options && options.forceInstalledAppsSheet);
      const forceImagesSheet = !!(options && options.forceImagesSheet);
      const forceVideosSheet = !!(options && options.forceVideosSheet);
      const forceAudiosSheet = !!(options && options.forceAudiosSheet);
      const forceWebBookmarksSheet = !!(options && options.forceWebBookmarksSheet);
      const forceWebHistorySheet = !!(options && options.forceWebHistorySheet);
      const forceNetworkConnectionsSheet = !!(options && options.forceNetworkConnectionsSheet);
      const forceBluetoothSheet = !!(options && options.forceBluetoothSheet);
      const forceSearchedItemsSheet = !!(options && options.forceSearchedItemsSheet);
      const forceDocumentsSheet = !!(options && options.forceDocumentsSheet);

      const modal = document.createElement("div");
      modal.className = "xls-modal";

      const dialog = document.createElement("div");
      dialog.className = "xls-dialog";

      // Trouver la feuille selon le type forcé
      let autoSheet = null;
      let sheetNotFoundMessage = null;

      if (forceContactsSheet) {
        autoSheet = (state.excelSheets || []).find(s => normalizeSearchText(s).includes("contact"));
        if (!autoSheet) sheetNotFoundMessage = "Contacts";
      } else if (forceCallLogSheet) {
        autoSheet = (state.excelSheets || []).find(s => {
          const n = normalizeSearchText(s);
          return n.includes("call") || n.includes("appel");
        });
        if (!autoSheet) sheetNotFoundMessage = "Call Log";
      } else if (forceChatsSheet) {
        // Priorite explicite: "Chats" d'abord, puis "Instant Messages" (cas Carte SIM / test2),
        // puis tout autre nom contenant "message".
        const sheets = state.excelSheets || [];
        autoSheet = sheets.find(s => normalizeSearchText(s).includes("chat"))
                 || sheets.find(s => normalizeSearchText(s).includes("instant message"))
                 || sheets.find(s => normalizeSearchText(s).includes("message"));
        if (!autoSheet) sheetNotFoundMessage = "Chats / Instant Messages";
      } else if (forceUserAccountsSheet) {
        autoSheet = (state.excelSheets || []).find(s => {
          const n = normalizeSearchText(s);
          return n.includes("user") && n.includes("account");
        });
        if (!autoSheet) sheetNotFoundMessage = "User Accounts";
      } else if (forceInstalledAppsSheet) {
        autoSheet = (state.excelSheets || []).find(s => normalizeSearchText(s).includes("installed") && normalizeSearchText(s).includes("app"));
        if (!autoSheet) sheetNotFoundMessage = "Installed Applications";
      } else if (forceImagesSheet) {
        autoSheet = (state.excelSheets || []).find(s => {
          const n = normalizeSearchText(s);
          return n === "images" || n.includes("images");
        });
        if (!autoSheet) sheetNotFoundMessage = "Images";
      } else if (forceVideosSheet) {
        autoSheet = (state.excelSheets || []).find(s => {
          const n = normalizeSearchText(s);
          return n === "videos" || n === "video" || n.includes("video");
        });
        if (!autoSheet) sheetNotFoundMessage = "Videos";
      } else if (forceAudiosSheet) {
        autoSheet = (state.excelSheets || []).find(s => {
          const n = normalizeSearchText(s);
          return n === "audios" || n.includes("audio");
        });
        if (!autoSheet) sheetNotFoundMessage = "Audios";
      } else if (forceWebBookmarksSheet) {
        autoSheet = (state.excelSheets || []).find(s => {
          const n = normalizeSearchText(s);
          return n.includes("bookmark") || n.includes("favori");
        });
        if (!autoSheet) sheetNotFoundMessage = "Web Bookmarks";
      } else if (forceWebHistorySheet) {
        autoSheet = (state.excelSheets || []).find(s => {
          const n = normalizeSearchText(s);
          return n.includes("web") && n.includes("history");
        });
        if (!autoSheet) sheetNotFoundMessage = "Web History";
      } else if (forceNetworkConnectionsSheet) {
        autoSheet = (state.excelSheets || []).find(s => {
          const n = normalizeSearchText(s);
          return n.includes("network") && n.includes("connection");
        });
        if (!autoSheet) sheetNotFoundMessage = "Network Connections";
      } else if (forceBluetoothSheet) {
        autoSheet = (state.excelSheets || []).find(s => {
          const n = normalizeSearchText(s);
          return n.includes("device") && n.includes("connectivity");
        });
        if (!autoSheet) sheetNotFoundMessage = "Device Connectivity";
      } else if (forceSearchedItemsSheet) {
        autoSheet = (state.excelSheets || []).find(s => {
          const n = normalizeSearchText(s);
          return n.includes("searched") && n.includes("item");
        });
        if (!autoSheet) sheetNotFoundMessage = "Searched Items";
      } else if (forceDocumentsSheet) {
        autoSheet = (state.excelSheets || []).find(s => {
          const n = normalizeSearchText(s);
          return n === "documents" || (n.includes("document") && !n.includes("app"));
        });
        if (!autoSheet) sheetNotFoundMessage = "Documents";
      }

      // Si la feuille n'est pas trouvée, afficher un message et ne pas ouvrir le modal
      if (sheetNotFoundMessage) {
        alert(`La feuille "${sheetNotFoundMessage}" n'est pas disponible dans le fichier Excel importé.`);
        return;
      }

      // Masquer le sélecteur si on a trouvé une feuille auto
      const hideSheetSelect = !!autoSheet;

      dialog.innerHTML = `
        <div class="xls-head">
          <div class="xls-title">
            <span class="xls-badge">${EXCEL_ICON}</span>
            <span>Ajouter un tableau Excel${autoSheet ? ` — ${escapeHtml(autoSheet)}` : ''}<span class="xls-sub">Feuille · colonnes · filtres</span></span>
          </div>
          <button id="closeTableModal" class="xls-close" title="Fermer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
        </div>
        <div class="xls-body">
        <div id="tableLoadStatus" style="display:none;margin-bottom:12px;padding:8px 10px;border-radius:6px;background:rgba(31,95,176,0.12);border:1px solid rgba(31,95,176,0.35);color:var(--muted);font-size:12px;"></div>
        <div id="sheetSelectSection" style="margin-bottom:16px;${hideSheetSelect ? 'display:none;' : ''}">
          <label style="display:block;margin-bottom:8px;color:var(--text);font-weight:600;">Feuille Excel:</label>
          <select id="sheetSelect" style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:14px;">
            <option value="">-- Sélectionnez une feuille --</option>
            ${state.excelSheets.map(sheet => `<option value="${escapeHtml(sheet)}"${autoSheet && sheet === autoSheet ? ' selected' : ''}>${escapeHtml(sheet)}</option>`).join("")}
          </select>
        </div>
        <div id="columnsSection" style="display:none;margin-bottom:16px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <label style="color:var(--text);font-weight:600;">Colonnes disponibles: <span id="colCount" style="color:var(--accent);font-weight:normal;"></span></label>
          </div>
          <div id="columnsCheckboxes" style="max-height:220px;overflow-y:auto;background:var(--bg-2);border-radius:8px;border:1px solid var(--border);"></div>
        </div>
        <div id="maxRowsSection" style="display:none;margin-bottom:16px;">
          <label style="display:block;margin-bottom:8px;color:var(--text);font-weight:600;">Nombre max de lignes: <span id="rowCountInfo" style="color:var(--accent);font-weight:normal;font-size:12px;"></span></label>
          <div style="display:flex;align-items:center;gap:12px;">
            <input type="number" id="maxRowsInput" value="50" min="1" max="500" style="width:100px;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);">
            <button id="loadPreviewBtn" style="padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px;">Charger l'aperçu</button>
            <span id="loadingIndicator" style="display:none;color:var(--accent);">⏳ Chargement...</span>
          </div>
        </div>
        <div id="previewSection" style="display:none;margin-bottom:16px;">
          <label style="display:block;margin-bottom:8px;color:var(--text);font-weight:600;">Aperçu du tableau:</label>
          <div id="tablePreview" style="max-height:74vh;overflow:auto;background:var(--bg-2);border-radius:8px;border:1px solid var(--border);padding:0 8px 8px;"></div>
        </div>
        </div>
        <div class="xls-foot">
          <button id="cancelTableBtn" style="padding:11px 22px;border-radius:10px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);cursor:pointer;font-weight:600;">Annuler</button>
          <button id="insertTableBtn" disabled style="padding:11px 22px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent-2),var(--accent));color:white;cursor:pointer;font-weight:700;opacity:0.5;">Insérer le tableau</button>
        </div>
      `;

      modal.appendChild(dialog);
      document.body.appendChild(modal);

      const sheetSelect = dialog.querySelector("#sheetSelect");
      const columnsSection = dialog.querySelector("#columnsSection");
      const columnsCheckboxes = dialog.querySelector("#columnsCheckboxes");
      const maxRowsSection = dialog.querySelector("#maxRowsSection");
      const previewSection = dialog.querySelector("#previewSection");
      const tablePreview = dialog.querySelector("#tablePreview");
      const insertBtn = dialog.querySelector("#insertTableBtn");
      const maxRowsInput = dialog.querySelector("#maxRowsInput");
      const loadPreviewBtn = dialog.querySelector("#loadPreviewBtn");
      const loadingIndicator = dialog.querySelector("#loadingIndicator");
      const colCountSpan = dialog.querySelector("#colCount");
      const tableLoadStatus = dialog.querySelector("#tableLoadStatus");

      let currentColumns = [];
      let currentData = [];
      let getFilteredDataFn = null; // Fonction pour obtenir les données filtrées
      let columnFilters = {}; // Pré-filtres par colonne (Set de valeurs sélectionnées)
      let totalRows = 0; // Nombre total de lignes disponibles
      let columnSelectionOrder = []; // Liste pour suivre l'ordre de sélection des colonnes

      // Mettre à jour le compteur de colonnes sélectionnées
      function updateColCount() {
        const checked = columnsCheckboxes.querySelectorAll("tbody input[data-col-checkbox]:checked").length;
        const total = columnsCheckboxes.querySelectorAll("tbody input[data-col-checkbox]").length;
        colCountSpan.textContent = `(${checked}/${total} sélectionnées)`;
      }

      // Mettre à jour l'affichage de l'ordre des colonnes
      function updateColumnSelectionUI() {
        columnsCheckboxes.querySelectorAll("tr[data-col-row]").forEach(row => {
          const colName = row.getAttribute("data-col-row");
          const orderBadge = row.querySelector(".col-order-badge");
          const checkbox = row.querySelector("input[data-col-checkbox]");
          const orderIndex = columnSelectionOrder.indexOf(colName);

          if (orderIndex >= 0 && checkbox && checkbox.checked) {
            orderBadge.textContent = orderIndex + 1;
            orderBadge.style.display = "inline";
            orderBadge.style.background = "var(--accent)";
          } else {
            orderBadge.style.display = "none";
          }
        });
        updateColCount();
      }

      // Fonction pour mettre à jour le badge de filtre
      function updateFilterBadge(colName) {
        const badges = columnsCheckboxes.querySelectorAll('.col-filter-badge');
        let badge = null;
        badges.forEach(b => {
          if (b.getAttribute('data-col') === colName) badge = b;
        });
        if (badge) {
          const filter = columnFilters[colName];
          if (filter) {
            badge.style.display = "inline";
            if (filter.type === 'contains') {
              badge.textContent = '~';  // Symbole pour "contient"
              badge.title = `Contient: "${filter.text}"`;
            } else if (filter.type === 'in' && filter.values && filter.values.size > 0) {
              badge.textContent = filter.values.size;
              badge.title = `${filter.values.size} valeur(s) sélectionnée(s)`;
            } else {
              badge.style.display = "none";
            }
          } else {
            badge.style.display = "none";
          }
        }
        // Mettre à jour le compteur de filtres actifs
        const activeFilters = Object.keys(columnFilters).filter(k => {
          const f = columnFilters[k];
          return f && ((f.type === 'contains' && f.text) || (f.type === 'in' && f.values && f.values.size > 0));
        }).length;
        if (tableLoadStatus) {
          tableLoadStatus.style.display = "block";
          tableLoadStatus.textContent = activeFilters > 0
            ? `${activeFilters} filtre(s) actif(s). ${totalRows} lignes disponibles.`
            : `Colonnes chargées. ${totalRows} lignes disponibles.`;
        }
      }

      // Charger les colonnes quand une feuille est sélectionnée
      sheetSelect.addEventListener("change", async () => {
        const sheetName = sheetSelect.value;
        if (!sheetName) {
          columnsSection.style.display = "none";
          maxRowsSection.style.display = "none";
          previewSection.style.display = "none";
          insertBtn.disabled = true;
          insertBtn.style.opacity = "0.5";
          return;
        }

        try {
          if(tableLoadStatus){
            tableLoadStatus.style.display = "block";
            tableLoadStatus.textContent = `Chargement des colonnes de "${sheetName}"...`;
          }
          sheetSelect.disabled = true;
          // Passer le filtre source si applicable pour avoir le bon nombre de lignes
          const sourceParam = filterBySourceTitle && sourceTitle ? `?source_filter=${encodeURIComponent(sourceTitle)}` : "";
          const res = await fetch(`/api/excel-columns/${encodeURIComponent(sheetName)}${sourceParam}`);
          const data = await res.json();
          sheetSelect.disabled = false;

          if (data.success && data.columns) {
            currentColumns = data.columns;
            // Pour Installed Applications, ne pré-sélectionner que Name et Identifier
            const installedAppsPreselect = forceInstalledAppsSheet ? ["name", "identifier"] : null;
            const shouldCheck = (colName) => {
              if (!installedAppsPreselect) return true; // Tout cocher par défaut
              const colLower = colName.toLowerCase();
              return installedAppsPreselect.some(preset => colLower.includes(preset));
            };
            // Réinitialiser les filtres pour la nouvelle feuille
            columnFilters = {};
            // Initialiser l'ordre de sélection des colonnes (colonnes pré-sélectionnées dans l'ordre initial)
            columnSelectionOrder = data.columns.filter(col => shouldCheck(col));

            // Affichage en tableau avec checkbox à gauche, numéro d'ordre et bouton filtre
            columnsCheckboxes.innerHTML = `
              <table style="width:100%;border-collapse:separate;border-spacing:0;border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.1);">
                <thead>
                  <tr style="background:linear-gradient(135deg,var(--panel) 0%,var(--panel-2) 100%);">
                    <th style="width:50px;padding:12px;border-bottom:2px solid var(--accent);text-align:center;">
                      <input type="checkbox" id="toggleAllCols" ${!installedAppsPreselect ? 'checked' : ''} style="cursor:pointer;accent-color:var(--accent);width:18px;height:18px;" title="Tout cocher/décocher">
                    </th>
                    <th style="width:45px;padding:12px;border-bottom:2px solid var(--accent);text-align:center;color:var(--accent);font-size:13px;font-weight:600;">Ordre</th>
                    <th style="padding:12px;border-bottom:2px solid var(--accent);text-align:left;color:var(--accent);font-size:13px;font-weight:600;">Nom de la colonne</th>
                    <th style="width:60px;padding:12px;border-bottom:2px solid var(--accent);text-align:center;color:var(--accent);font-size:13px;font-weight:600;">Filtre</th>
                  </tr>
                </thead>
                <tbody>
                  ${data.columns.map((col, i) => {
                    const isChecked = shouldCheck(col);
                    const orderIndex = isChecked ? columnSelectionOrder.indexOf(col) : -1;
                    return `
                    <tr data-col-row="${escapeHtml(col)}" style="background:${i % 2 === 0 ? 'var(--bg)' : 'rgba(255,255,255,0.03)'};transition:background 0.15s;" onmouseover="this.style.background='rgba(66,153,225,0.12)'" onmouseout="this.style.background='${i % 2 === 0 ? 'var(--bg)' : 'rgba(255,255,255,0.03)'}'">
                      <td style="padding:10px 12px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05);">
                        <input type="checkbox" data-col-checkbox value="${escapeHtml(col)}" ${isChecked ? 'checked' : ''} style="cursor:pointer;accent-color:var(--accent);width:16px;height:16px;">
                      </td>
                      <td style="padding:10px 12px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05);">
                        <span class="col-order-badge" data-col-order="${escapeHtml(col)}" style="${orderIndex >= 0 ? '' : 'display:none;'}background:var(--accent);color:#fff;font-size:11px;font-weight:bold;padding:2px 8px;border-radius:10px;">${orderIndex >= 0 ? orderIndex + 1 : ''}</span>
                      </td>
                      <td style="padding:10px 12px;color:var(--text);font-size:13px;border-bottom:1px solid rgba(255,255,255,0.05);" title="${escapeHtml(col)}">
                        ${escapeHtml(col)}
                        <span class="col-filter-badge" data-col="${escapeHtml(col)}" style="display:none;margin-left:6px;background:var(--accent);color:#fff;padding:1px 6px;border-radius:10px;font-size:10px;"></span>
                      </td>
                      <td style="padding:10px 12px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05);">
                        <button type="button" class="col-filter-btn" data-col="${escapeHtml(col)}" style="background:none;border:1px solid var(--border);border-radius:4px;padding:4px 8px;cursor:pointer;color:var(--text);font-size:12px;" title="Filtrer les valeurs">▼</button>
                      </td>
                    </tr>
                  `}).join("")}
                </tbody>
              </table>
            `;

            // Gérer les clics sur les boutons de filtre
            columnsCheckboxes.querySelectorAll(".col-filter-btn").forEach(btn => {
              btn.addEventListener("click", async (e) => {
                e.stopPropagation();
                const colName = btn.getAttribute("data-col");
                const currentSheet = sheetSelect.value;

                // Fermer les autres dropdowns
                document.querySelectorAll(".prefilter-dropdown").forEach(d => d.remove());

                // Créer le dropdown
                const dropdown = document.createElement("div");
                dropdown.className = "prefilter-dropdown";
                dropdown.style.cssText = "position:fixed;z-index:10000;background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.4);min-width:300px;max-width:380px;display:flex;flex-direction:column;";

                // Récupérer le filtre existant (peut être {type: 'in', values: Set} ou {type: 'contains', text: string})
                const existingFilter = columnFilters[colName];
                const existingContains = existingFilter && existingFilter.type === 'contains' ? existingFilter.text : '';

                dropdown.innerHTML = `
                  <div style="padding:12px;border-bottom:1px solid var(--border);flex-shrink:0;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                      <span style="font-weight:600;color:var(--text);font-size:12px;">Filtrer: ${escapeHtml(colName)}</span>
                      <span class="prefilter-loading" style="color:var(--accent);font-size:11px;">Chargement...</span>
                    </div>
                    <div style="margin-bottom:10px;padding:8px;background:rgba(31,95,176,0.1);border-radius:6px;border:1px solid rgba(31,95,176,0.3);">
                      <label style="font-size:11px;color:var(--accent);font-weight:600;display:block;margin-bottom:4px;">Contient (texte partiel):</label>
                      <input type="text" class="prefilter-contains" placeholder="ex: DCIM, .jpg, media..." value="${escapeHtml(existingContains)}" style="width:100%;padding:8px;border:1px solid var(--accent);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px;box-sizing:border-box;">
                      <div style="font-size:10px;color:var(--text-muted);margin-top:4px;">Garde les lignes dont cette colonne contient le texte</div>
                    </div>
                    <div style="border-top:1px solid var(--border);padding-top:8px;">
                      <label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px;">Ou sélectionner des valeurs exactes:</label>
                      <input type="text" class="prefilter-search" placeholder="Rechercher dans la liste..." style="width:100%;padding:8px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px;box-sizing:border-box;">
                      <div style="display:flex;gap:8px;margin-top:8px;">
                        <button type="button" class="prefilter-select-all" style="flex:1;padding:4px 8px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:10px;">✓ Tout</button>
                        <button type="button" class="prefilter-deselect-all" style="flex:1;padding:4px 8px;background:#718096;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:10px;">✕ Aucun</button>
                      </div>
                    </div>
                  </div>
                  <div class="prefilter-values" style="flex:1;overflow:auto;padding:8px;min-height:100px;max-height:200px;"></div>
                  <div style="padding:10px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:var(--panel);">
                    <button type="button" class="prefilter-clear" style="padding:6px 12px;background:#e53e3e;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;">Effacer</button>
                    <button type="button" class="prefilter-apply" style="padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;">Appliquer</button>
                  </div>
                `;

                // Positionner le dropdown (position fixe avec ajustement si déborde)
                const rect = btn.getBoundingClientRect();
                const dropdownHeight = 350; // Hauteur approximative
                let topPos = rect.bottom + 5;
                // Si le dropdown déborde en bas, le positionner au-dessus du bouton
                if (topPos + dropdownHeight > window.innerHeight) {
                  topPos = Math.max(10, rect.top - dropdownHeight - 5);
                }
                dropdown.style.top = topPos + "px";
                dropdown.style.left = Math.min(rect.left, window.innerWidth - 400) + "px";
                dropdown.style.maxHeight = Math.min(350, window.innerHeight - topPos - 20) + "px";
                document.body.appendChild(dropdown);

                const valuesContainer = dropdown.querySelector(".prefilter-values");
                const searchInput = dropdown.querySelector(".prefilter-search");
                const containsInput = dropdown.querySelector(".prefilter-contains");
                const loadingSpan = dropdown.querySelector(".prefilter-loading");

                // Charger les valeurs uniques
                try {
                  const resp = await fetch("/api/excel-column-values", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                      sheet_name: currentSheet,
                      column: colName,
                      source_filter: filterBySourceTitle ? sourceTitle : null
                    })
                  });
                  const result = await resp.json();

                  if (result.success) {
                    const values = result.values || [];
                    // Récupérer le filtre existant de type "in" (Set de valeurs)
                    const existingInFilter = (existingFilter && existingFilter.type === 'in') ? existingFilter.values : new Set();

                    loadingSpan.textContent = result.truncated ? `(${values.length}+ valeurs)` : `(${values.length} valeurs)`;

                    const renderValues = (filterText = "") => {
                      const filtered = filterText
                        ? values.filter(v => String(v).toLowerCase().includes(filterText.toLowerCase()))
                        : values;

                      valuesContainer.innerHTML = filtered.slice(0, 500).map((val, idx) => {
                        // Par défaut décoché, sauf si explicitement dans le filtre existant
                        const isChecked = existingInFilter.has(val);
                        return `
                          <label style="display:flex;align-items:center;gap:10px;padding:7px 10px;cursor:pointer;border-radius:4px;font-size:12px;color:var(--text);border-bottom:1px solid rgba(255,255,255,0.04);width:max-content;min-width:100%;box-sizing:border-box;" onmouseover="this.style.background='rgba(31,95,176,0.18)'" onmouseout="this.style.background='transparent'">
                            <input type="checkbox" data-val-idx="${idx}" ${isChecked ? 'checked' : ''} style="accent-color:var(--accent);">
                            <span style="white-space:nowrap;flex-shrink:0;" title="${escapeHtml(String(val))}">${escapeHtml(String(val))}</span>
                          </label>
                        `;
                      }).join("");

                      if (filtered.length > 500) {
                        valuesContainer.innerHTML += `<div style="padding:8px;color:var(--accent);font-size:11px;text-align:center;">+ ${filtered.length - 500} autres valeurs (utilisez la recherche)</div>`;
                      }

                      // Stocker les valeurs filtrées pour la récupération
                      valuesContainer._filteredValues = filtered.slice(0, 500);
                    };

                    renderValues();

                    searchInput.addEventListener("input", () => {
                      renderValues(searchInput.value);
                    });

                    // Bouton Tout sélectionner
                    dropdown.querySelector(".prefilter-select-all").addEventListener("click", () => {
                      valuesContainer.querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = true);
                    });

                    // Bouton Tout désélectionner
                    dropdown.querySelector(".prefilter-deselect-all").addEventListener("click", () => {
                      valuesContainer.querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = false);
                    });

                    // Effacer le filtre
                    dropdown.querySelector(".prefilter-clear").addEventListener("click", () => {
                      delete columnFilters[colName];
                      updateFilterBadge(colName);
                      dropdown.remove();
                    });

                    // Appliquer le filtre
                    dropdown.querySelector(".prefilter-apply").addEventListener("click", () => {
                      const containsValue = containsInput.value.trim();
                      const checkedBoxes = valuesContainer.querySelectorAll("input[type=checkbox]:checked");
                      const filteredVals = valuesContainer._filteredValues || values.slice(0, 500);

                      // Priorité au filtre "contient" si rempli
                      if (containsValue) {
                        columnFilters[colName] = { type: 'contains', text: containsValue };
                      } else if (checkedBoxes.length === 0) {
                        // Aucune valeur cochée et pas de contains = tout effacer
                        delete columnFilters[colName];
                      } else if (checkedBoxes.length < filteredVals.length) {
                        // Certaines valeurs cochées = créer le filtre "in"
                        const selected = new Set();
                        checkedBoxes.forEach(cb => {
                          const idx = parseInt(cb.getAttribute("data-val-idx"));
                          if (filteredVals[idx] !== undefined) {
                            selected.add(filteredVals[idx]);
                          }
                        });
                        columnFilters[colName] = { type: 'in', values: selected };
                      } else {
                        // Tout coché = pas de filtre
                        delete columnFilters[colName];
                      }

                      updateFilterBadge(colName);
                      dropdown.remove();
                    });

                  } else {
                    valuesContainer.innerHTML = `<div style="color:#e53e3e;padding:12px;">Erreur: ${result.error || "Impossible de charger"}</div>`;
                    loadingSpan.textContent = "";
                  }
                } catch (err) {
                  valuesContainer.innerHTML = `<div style="color:#e53e3e;padding:12px;">Erreur de connexion</div>`;
                  loadingSpan.textContent = "";
                }

                // Fermer en cliquant ailleurs
                setTimeout(() => {
                  const closeDropdown = (ev) => {
                    if (!dropdown.contains(ev.target) && ev.target !== btn) {
                      dropdown.remove();
                      document.removeEventListener("click", closeDropdown);
                    }
                  };
                  document.addEventListener("click", closeDropdown);
                }, 10);
              });
            });

            // Toggle all avec la checkbox d'en-tête
            const toggleAll = columnsCheckboxes.querySelector("#toggleAllCols");
            toggleAll.addEventListener("change", () => {
              columnsCheckboxes.querySelectorAll("tbody input[data-col-checkbox]").forEach(cb => cb.checked = toggleAll.checked);
              // Mettre à jour l'ordre de sélection
              if (toggleAll.checked) {
                columnSelectionOrder = [...currentColumns];
              } else {
                columnSelectionOrder = [];
              }
              updateColumnSelectionUI();
            });

            // Gestion des checkboxes individuelles pour l'ordre
            columnsCheckboxes.querySelectorAll("tbody input[data-col-checkbox]").forEach(checkbox => {
              checkbox.addEventListener("change", (e) => {
                const colName = checkbox.value;
                if (checkbox.checked) {
                  // Ajouter à la fin de l'ordre si pas déjà présent
                  if (!columnSelectionOrder.includes(colName)) {
                    columnSelectionOrder.push(colName);
                  }
                } else {
                  // Retirer de l'ordre
                  columnSelectionOrder = columnSelectionOrder.filter(c => c !== colName);
                }
                updateColumnSelectionUI();
              });
            });

            columnsSection.style.display = "block";
            maxRowsSection.style.display = "block";
            previewSection.style.display = "none";
            currentData = [];
            updateColumnSelectionUI();

            // Initialiser le nombre max de lignes avec le total de la feuille
            totalRows = data.total_rows || 50;
            maxRowsInput.value = totalRows;
            maxRowsInput.max = Math.max(500, totalRows); // Permettre plus si le total dépasse 500

            // Afficher le nombre de lignes avec info filtre source
            const rowCountInfo = dialog.querySelector("#rowCountInfo");
            if (rowCountInfo) {
              if (filterBySourceTitle && sourceTitle) {
                rowCountInfo.textContent = `(${totalRows} lignes filtrées par Source: ${sourceTitle})`;
              } else {
                rowCountInfo.textContent = `(${totalRows} lignes disponibles)`;
              }
            }

            if(tableLoadStatus){
              const sourceMsg = filterBySourceTitle ? ` | source: ${sourceTitle}` : "";
              tableLoadStatus.textContent = `Colonnes chargées. ${totalRows} lignes disponibles${sourceMsg}.`;
            }
          }
        } catch (err) {
          sheetSelect.disabled = false;
          if(tableLoadStatus){
            tableLoadStatus.style.display = "block";
            tableLoadStatus.textContent = "Erreur de chargement des colonnes.";
          }
          console.error("Erreur chargement colonnes:", err);
          alert("Erreur lors du chargement des colonnes");
        }
      });

      // Select/Deselect all (boutons retirés — la case d'en-tête #toggleAllCols gère tout/aucun)
      dialog.querySelector("#selectAllCols")?.addEventListener("click", () => {
        columnsCheckboxes.querySelectorAll("tbody input[data-col-checkbox]").forEach(cb => cb.checked = true);
        const toggleAll = columnsCheckboxes.querySelector("#toggleAllCols");
        if (toggleAll) toggleAll.checked = true;
        columnSelectionOrder = [...currentColumns];
        updateColumnSelectionUI();
      });
      dialog.querySelector("#deselectAllCols")?.addEventListener("click", () => {
        columnsCheckboxes.querySelectorAll("tbody input[data-col-checkbox]").forEach(cb => cb.checked = false);
        const toggleAll = columnsCheckboxes.querySelector("#toggleAllCols");
        if (toggleAll) toggleAll.checked = false;
        columnSelectionOrder = [];
        updateColumnSelectionUI();
      });

      // Mettre à jour le compteur quand on clique sur une checkbox
      columnsCheckboxes.addEventListener("change", (e) => {
        // Mettre à jour l'état du toggle all si on clique sur une checkbox individuelle
        if (e.target.id !== "toggleAllCols" && !e.target.hasAttribute("data-val-idx")) {
          const allCbs = columnsCheckboxes.querySelectorAll("tbody input[data-col-checkbox]");
          const checkedCbs = columnsCheckboxes.querySelectorAll("tbody input[data-col-checkbox]:checked");
          const toggleAll = columnsCheckboxes.querySelector("#toggleAllCols");
          if (toggleAll) {
            toggleAll.checked = allCbs.length === checkedCbs.length;
            toggleAll.indeterminate = checkedCbs.length > 0 && checkedCbs.length < allCbs.length;
          }
        }
        updateColCount();
      });

      // Charger l'aperçu uniquement sur clic du bouton (pas à chaque changement)
      loadPreviewBtn.addEventListener("click", async () => {
        // Utiliser l'ordre de sélection des colonnes
        const selectedCols = columnSelectionOrder.filter(col => {
          const checkbox = columnsCheckboxes.querySelector(`input[data-col-checkbox][value="${CSS.escape(col)}"]`);
          return checkbox && checkbox.checked;
        });
        if (selectedCols.length === 0) {
          alert("Veuillez sélectionner au moins une colonne.");
          return;
        }

        loadingIndicator.style.display = "inline";
        loadPreviewBtn.disabled = true;

        try {
          if(tableLoadStatus){
            tableLoadStatus.style.display = "block";
            tableLoadStatus.textContent = "Chargement de l'aperçu du tableau avec filtres...";
          }

          // Construire les filtres à partir des pré-filtres définis
          const preFiltersArray = [];
          for (const col in columnFilters) {
            const filter = columnFilters[col];
            if (filter) {
              if (filter.type === 'contains' && filter.text) {
                // Filtre "contains" avec texte partiel
                preFiltersArray.push({
                  column: col,
                  operator: "contains",
                  text: filter.text
                });
              } else if (filter.type === 'in' && filter.values && filter.values.size > 0) {
                // Filtre "in" avec les valeurs sélectionnées
                preFiltersArray.push({
                  column: col,
                  operator: "in",
                  values: Array.from(filter.values)
                });
              }
            }
          }

          const res = await fetch("/api/excel-table-data", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              sheet: sheetSelect.value,
              columns: selectedCols,
              max_rows: parseInt(maxRowsInput.value) || 50,
              source_filter: filterBySourceTitle ? sourceTitle : null,
              connectivity_filter: forceBluetoothSheet ? "Bluetooth" : null,
              pre_filters: preFiltersArray
            })
          });
          const result = await res.json();

          loadingIndicator.style.display = "none";
          loadPreviewBtn.disabled = false;
          if(tableLoadStatus){
            tableLoadStatus.style.display = "block";
            tableLoadStatus.textContent = "Erreur de chargement de l'aperçu.";
          }

          if (result.success) {
            // Le backend applique désormais le filtre source avant limitation
            currentData = result.data || [];

            // Nettoyer le HTML de la colonne Body pour les Emails
            const selectedSheet = sheetSelect.value || "";
            if (selectedSheet.toLowerCase().includes("email")) {
              currentData = currentData.map(row => {
                if (row.Body) {
                  row.Body = stripHtmlTags(row.Body);
                }
                return row;
              });
            }

            // Pour Installed Applications, filtrer les lignes contenant com.apple, com.android ou com.google
            if (forceInstalledAppsSheet) {
              currentData = currentData.filter(row => {
                const rowValues = Object.values(row).map(v => String(v || "").toLowerCase());
                const hasApple = rowValues.some(v => v.includes("com.apple"));
                const hasAndroid = rowValues.some(v => v.includes("com.android"));
                const hasGoogle = rowValues.some(v => v.includes("com.google"));
                return !hasApple && !hasAndroid && !hasGoogle;
              });
            }

            // Le filtre Bluetooth est maintenant appliqué côté backend via connectivity_filter

            // État des filtres par colonne (Set de valeurs sélectionnées, ou null si pas de filtre)
            let columnFilters = {};
            selectedCols.forEach(col => columnFilters[col] = null); // null = pas de filtre (toutes les valeurs)

            // Fonction pour obtenir les valeurs uniques d'une colonne
            const getUniqueValues = (col) => {
              const values = new Set();
              currentData.forEach(row => {
                const val = row[col];
                values.add(val === null || val === undefined || val === '' ? 'N/C' : String(val));
              });
              return Array.from(values).sort((a, b) => a.localeCompare(b, 'fr', {numeric: true}));
            };

            // Fonction pour filtrer les données selon les filtres actifs
            const getFilteredData = () => {
              return currentData.filter(row => {
                for (const col in columnFilters) {
                  const filter = columnFilters[col];
                  if (filter === null) continue;

                  const val = row[col];
                  const cellVal = val === null || val === undefined || val === '' ? 'N/C' : String(val);

                  // Support nouveau format {type: 'contains'/'in', ...}
                  if (filter.type === 'contains' && filter.text) {
                    if (!cellVal.toLowerCase().includes(filter.text.toLowerCase())) return false;
                  } else if (filter.type === 'in' && filter.values && filter.values.size > 0) {
                    if (!filter.values.has(cellVal)) return false;
                  } else if (filter.size > 0) {
                    // Ancien format Set (compatibilité)
                    if (!filter.has(cellVal)) return false;
                  }
                }
                return true;
              });
            };
            // Exposer la fonction au scope parent pour l'insertion
            getFilteredDataFn = getFilteredData;

            // Fonction pour rendre le tableau
            const renderTable = () => {
              const filteredData = getFilteredData();
              const activeFiltersCount = Object.values(columnFilters).filter(v => {
                if (v === null) return false;
                if (v.type === 'contains') return !!v.text;
                if (v.type === 'in') return v.values && v.values.size > 0;
                return v.size > 0;  // Ancien format
              }).length;

              let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;flex-wrap:wrap;">
                <span class="xls-stats">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M3 14h18M9 4v16"/></svg>
                  <b>${filteredData.length}${activeFiltersCount > 0 ? `/${currentData.length}` : ''}</b> lignes <span class="xls-dot"></span> <b>${selectedCols.length}</b> colonnes${filterBySourceTitle ? ` <span class="xls-dot"></span> source <b>${escapeHtml(sourceTitle)}</b>` : ""}
                </span>
                ${activeFiltersCount > 0 ? `<button id="clearAllFilters" class="xls-clearbtn">Effacer filtres (${activeFiltersCount})</button>` : ''}
              </div>`;

              // Calculer largeurs adaptatives par colonne
              const getColWidth = (col) => {
                const headerLen = col.length;
                let maxDataLen = 0;
                filteredData.slice(0, 50).forEach(row => {
                  const val = String(row[col] === null || row[col] === undefined ? '' : row[col]);
                  if (val.length > maxDataLen) maxDataLen = val.length;
                });
                const maxLen = Math.max(headerLen, maxDataLen);
                if (maxLen <= 8) return '90px';
                if (maxLen <= 15) return '140px';
                if (maxLen <= 25) return '200px';
                if (maxLen <= 40) return '280px';
                return '350px';
              };

              html += `<div style="border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.15);"><table style="width:100%;border-collapse:separate;border-spacing:0;font-size:12px;">`;

              // Header avec filtres dropdown - design amélioré
              html += `<thead><tr style="background:linear-gradient(135deg,var(--panel) 0%,var(--panel-2) 100%);">`;
              selectedCols.forEach((col, colIdx) => {
                const filter = columnFilters[col];
                let hasFilter = false;
                let filterLabel = '▼';
                if (filter !== null) {
                  if (filter.type === 'contains' && filter.text) {
                    hasFilter = true;
                    filterLabel = '~';  // Symbole pour "contient"
                  } else if (filter.type === 'in' && filter.values && filter.values.size > 0) {
                    hasFilter = true;
                    filterLabel = `☑${filter.values.size}`;
                  } else if (filter.size > 0) {
                    // Ancien format Set
                    hasFilter = true;
                    filterLabel = `☑${filter.size}`;
                  }
                }
                html += `<th style="padding:0;border-bottom:2px solid var(--accent);text-align:left;color:var(--accent);font-weight:600;position:sticky;top:0;z-index:2;background:var(--panel);min-width:165px;">
                  <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;gap:4px;">
                    <span style="word-break:break-word;font-size:12px;">${escapeHtml(col)}</span>
                    <span style="display:flex;gap:4px;align-items:center;">
                      <button class="col-filter-btn" data-col="${escapeHtml(col)}" style="background:${hasFilter ? 'linear-gradient(135deg,var(--accent),var(--accent))' : 'rgba(255,255,255,0.1)'};border:none;color:${hasFilter ? '#fff' : 'var(--muted)'};cursor:pointer;padding:3px 6px;border-radius:4px;font-size:10px;transition:all 0.15s;" title="Filtrer ${escapeHtml(col)}">${filterLabel}</button>
                      <button type="button" class="col-delete-btn col-x" data-col="${escapeHtml(col)}" title="Supprimer la colonne ${escapeHtml(col)} de l'aperçu"></button>
                    </span>
                  </div>
                </th>`;
              });
              html += `</tr></thead>`;

              // Body avec design amélioré
              html += `<tbody>`;
              if (filteredData.length === 0) {
                html += `<tr><td colspan="${selectedCols.length}" style="padding:16px;text-align:center;color:var(--muted);font-style:italic;background:rgba(0,0,0,0.05);">Aucune ligne ne correspond aux filtres.</td></tr>`;
              } else {
                filteredData.forEach((row, i) => {
                  const bgColor = i % 2 === 0 ? "var(--bg)" : "rgba(255,255,255,0.03)";
                  html += `<tr style="background:${bgColor};transition:background 0.15s;" onmouseover="this.style.background='rgba(66,153,225,0.12)'" onmouseout="this.style.background='${bgColor}'">`;
                  selectedCols.forEach(col => {
                    const val = row[col];
                    const displayVal = val === null || val === undefined || val === '' ? 'N/C' : String(val);
                    const isNC = displayVal === 'N/C';
                    html += `<td style="padding:8px 12px;border-bottom:1px solid var(--border);color:${isNC ? 'var(--muted)' : 'var(--text)'};font-style:${isNC ? 'italic' : 'normal'};word-break:break-word;vertical-align:top;min-width:165px;" title="${escapeHtml(displayVal)}">${escapeHtml(displayVal)}</td>`;
                  });
                  html += `</tr>`;
                });
              }
              html += `</tbody></table></div>`;

              tablePreview.innerHTML = html;

              // Event: Clear all filters
              const clearBtn = tablePreview.querySelector("#clearAllFilters");
              if (clearBtn) {
                clearBtn.addEventListener("click", () => {
                  selectedCols.forEach(col => columnFilters[col] = null);
                  renderTable();
                });
              }
              // Mode aperçu plein modal : le tableau occupe toute la page
              dialog.classList.add("previewing");

              // Event: Delete column buttons (× sur chaque header)
              tablePreview.querySelectorAll(".col-delete-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                  e.stopPropagation();
                  const col = btn.dataset.col;
                  // Decocher la checkbox correspondante dans le panneau "Colonnes disponibles"
                  const _cb = columnsCheckboxes.querySelector(`input[data-col-checkbox][value="${CSS.escape(col)}"]`);
                  if (_cb) _cb.checked = false;
                  // Retirer du selection order
                  const _ordIdx = columnSelectionOrder.indexOf(col);
                  if (_ordIdx >= 0) columnSelectionOrder.splice(_ordIdx, 1);
                  // Retirer de selectedCols (en place, pour que renderTable() reflete)
                  const _idx = selectedCols.indexOf(col);
                  if (_idx >= 0) selectedCols.splice(_idx, 1);
                  // Retirer aussi le filtre associe a cette colonne (s'il existe)
                  delete columnFilters[col];
                  // Mettre a jour les badges d'ordre
                  if (typeof updateColumnSelectionUI === 'function') updateColumnSelectionUI();
                  if (selectedCols.length === 0) {
                    tablePreview.innerHTML = '<div style="padding:16px;color:var(--muted);font-style:italic;">Aucune colonne. Coche au moins une colonne dans la liste pour relancer l\'aperçu.</div>';
                    return;
                  }
                  renderTable();
                });
              });

              // Event: Filter buttons (avec cases à cocher multi-sélection)
              tablePreview.querySelectorAll(".col-filter-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                  e.stopPropagation();
                  const col = btn.dataset.col;

                  // Fermer tout dropdown existant
                  document.querySelectorAll(".col-filter-dropdown").forEach(d => d.remove());

                  // Créer dropdown avec checkboxes
                  const uniqueVals = getUniqueValues(col);
                  // Support nouveau format {type: 'in', values: Set} ou ancien Set
                  let currentFilter = new Set();
                  if (columnFilters[col]) {
                    if (columnFilters[col].type === 'in' && columnFilters[col].values) {
                      currentFilter = columnFilters[col].values;
                    } else if (columnFilters[col].size !== undefined) {
                      currentFilter = columnFilters[col];
                    }
                  }
                  const dropdown = document.createElement("div");
                  dropdown.className = "col-filter-dropdown";
                  dropdown.style.cssText = "position:absolute;top:100%;left:0;right:0;background:var(--panel);border:1px solid var(--border);border-radius:6px;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,0.6);min-width:200px;";

                  // Récupérer le filtre contains existant
                  const existingContains = (columnFilters[col] && columnFilters[col].type === 'contains') ? columnFilters[col].text : '';

                  let dropdownHtml = `
                    <div style="padding:8px;border-bottom:1px solid var(--border);">
                      <div style="margin-bottom:8px;padding:6px;background:rgba(31,95,176,0.1);border-radius:4px;border:1px solid rgba(31,95,176,0.3);">
                        <label style="font-size:10px;color:var(--accent);font-weight:600;display:block;margin-bottom:3px;">Contient:</label>
                        <input type="text" class="filter-contains" placeholder="ex: DCIM, .jpg..." value="${escapeHtml(existingContains)}" style="width:100%;padding:5px 8px;border:1px solid var(--accent);border-radius:4px;background:var(--panel);color:var(--text);font-size:11px;box-sizing:border-box;">
                      </div>
                      <label style="font-size:10px;color:var(--muted);display:block;margin-bottom:3px;">Ou sélectionner:</label>
                      <input type="text" class="filter-search" placeholder="🔍 Rechercher..." style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:4px;background:var(--panel);color:var(--text);font-size:11px;box-sizing:border-box;">
                    </div>
                    <div class="filter-options" style="max-height:150px;overflow:auto;padding:4px 0;">`;

                  uniqueVals.forEach((val, idx) => {
                    // Décoché par défaut, coché seulement si déjà dans le filtre actif
                    const isChecked = currentFilter.size > 0 && currentFilter.has(val);
                    dropdownHtml += `
                      <label class="filter-option" data-idx="${idx}" style="display:flex;align-items:center;padding:6px 10px;cursor:pointer;font-size:11px;color:var(--text);transition:background 0.1s;width:max-content;min-width:100%;box-sizing:border-box;">
                        <input type="checkbox" class="filter-checkbox" data-idx="${idx}" ${isChecked ? 'checked' : ''} style="margin-right:8px;accent-color:var(--accent);cursor:pointer;width:14px;height:14px;">
                        <span style="white-space:nowrap;flex-shrink:0;" title="${escapeHtml(val)}">${escapeHtml(val)}</span>
                      </label>`;
                  });
                  dropdownHtml += `</div>
                    <div style="padding:8px;border-top:1px solid var(--border);display:flex;gap:8px;">
                      <button class="filter-apply" style="flex:1;padding:6px 12px;font-size:11px;background:linear-gradient(135deg,var(--accent),var(--accent));color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:600;">Appliquer</button>

                    </div>`;
                  dropdown.innerHTML = dropdownHtml;

                  btn.parentElement.parentElement.appendChild(dropdown);

                  // Focus search
                  const searchInput = dropdown.querySelector(".filter-search");
                  searchInput.focus();

                  // Recherche dans les options
                  searchInput.addEventListener("input", () => {
                    const term = searchInput.value.toLowerCase();
                    dropdown.querySelectorAll(".filter-option").forEach(opt => {
                      const text = opt.querySelector("span").textContent.toLowerCase();
                      const matches = text.includes(term);
                      opt.style.display = matches ? "flex" : "none";
                    });
                  });

                  // Hover effect sur les options
                  dropdown.querySelectorAll(".filter-option").forEach(opt => {
                    opt.addEventListener("mouseenter", () => opt.style.background = "rgba(31,95,176,0.15)");
                    opt.addEventListener("mouseleave", () => opt.style.background = "transparent");
                  });

                  // Appliquer le filtre
                  dropdown.querySelector(".filter-apply").addEventListener("click", () => {
                    const containsInput = dropdown.querySelector(".filter-contains");
                    const containsValue = containsInput ? containsInput.value.trim() : '';

                    // Priorité au filtre "contient" si rempli
                    if (containsValue) {
                      columnFilters[col] = { type: 'contains', text: containsValue };
                    } else {
                      const checkedValues = new Set();
                      dropdown.querySelectorAll(".filter-checkbox:checked").forEach(cb => {
                        const idx = parseInt(cb.dataset.idx);
                        checkedValues.add(uniqueVals[idx]);
                      });
                      // Si rien n'est coché, pas de filtre (montrer tout)
                      if (checkedValues.size === 0) {
                        columnFilters[col] = null;
                      } else {
                        // Utiliser le nouveau format
                        columnFilters[col] = { type: 'in', values: checkedValues };
                      }
                    }
                    dropdown.remove();
                    renderTable();
                  });

                  // Annuler
                  dropdown.querySelector(".filter-cancel").addEventListener("click", () => {
                    dropdown.remove();
                  });

                  // Fermer sur clic extérieur
                  setTimeout(() => {
                    const closeDropdown = (ev) => {
                      if (!dropdown.contains(ev.target) && ev.target !== btn) {
                        dropdown.remove();
                        document.removeEventListener("click", closeDropdown);
                      }
                    };
                    document.addEventListener("click", closeDropdown);
                  }, 10);
                });
              });

              // Update insert button state
              insertBtn.disabled = filteredData.length === 0;
              insertBtn.style.opacity = filteredData.length === 0 ? "0.5" : "1";
            };

            // Render initial table
            renderTable();
            previewSection.style.display = "block";

            if(tableLoadStatus){
              tableLoadStatus.style.display = "block";
              tableLoadStatus.textContent = `Aperçu chargé (${currentData.length} lignes).`;
            }
          }
        } catch (err) {
          loadingIndicator.style.display = "none";
          loadPreviewBtn.disabled = false;
          console.error("Erreur chargement données:", err);
          alert("Erreur lors du chargement des données");
        }
      });

      // Insert table
      insertBtn.addEventListener("click", () => {
        // Utiliser l'ordre de sélection des colonnes
        const selectedCols = columnSelectionOrder.filter(col => {
          const checkbox = columnsCheckboxes.querySelector(`input[data-col-checkbox][value="${CSS.escape(col)}"]`);
          return checkbox && checkbox.checked;
        });
        // Utiliser les données filtrées si disponible, sinon toutes les données
        const dataToInsert = getFilteredDataFn ? getFilteredDataFn() : currentData;
        if (selectedCols.length === 0 || dataToInsert.length === 0) return;

        // Ajouter le tableau au headingContent avec le TITRE (pas l'index)
        if (!state.headingContent[headingTitle]) {
          state.headingContent[headingTitle] = [];
        }
        state.headingContent[headingTitle].push({
          type: "table",
          sheet: sheetSelect.value,
          columns: selectedCols,
          displayColumns: [...selectedCols], // Copie pour permettre l'édition des noms affichés
          data: dataToInsert
        });

        closeModal();
        renderPreview();
      });

      // Close handlers
      const closeModal = () => {
        if (document.body.contains(modal)) {
          document.body.removeChild(modal);
        }
      };
      dialog.querySelector("#closeTableModal").addEventListener("click", closeModal);
      dialog.querySelector("#cancelTableBtn").addEventListener("click", closeModal);

      // Empêcher les clics dans le dialog de propager vers le modal (backdrop)
      dialog.addEventListener("click", (e) => e.stopPropagation());

      // Fermer uniquement si on clique sur le backdrop (pas sur le dialog)
      modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModal();
      });

      // Auto-charger la feuille si une feuille auto est définie
      if (autoSheet) {
        sheetSelect.value = autoSheet;
        // Déclencher l'événement change pour charger les colonnes
        sheetSelect.dispatchEvent(new Event("change"));
      }
    }
