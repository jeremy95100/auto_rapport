<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rapport Auto</title>
  <style>
    :root {
      /* Palette institutionnelle SIN — claire, blanc / acier, accents tricolores */
      --bg: #e7ecf4;          /* bureau gris-bleu clair */
      --bg-2: #f5f8fc;        /* inset / fond de champ */
      --panel: #ffffff;       /* panneaux blancs */
      --panel-2: #eef3fa;     /* surfaces secondaires */
      --elev: #ffffff;
      --accent: #1f5fb0;      /* bleu institutionnel (drapeau) */
      --accent-2: #2f78d0;
      --accent-strong: #0d2c54;
      --accent-soft: rgba(31,95,176,0.10);
      --accent-glow: rgba(47,120,208,0.35);
      --red: #c8102e;         /* rouge tricolore */
      --red-soft: rgba(200,16,46,0.10);
      --green: #1f9d57;
      --green-soft: rgba(31,95,176,0.12);
      --text: #16202e;        /* encre */
      --muted: #5a6675;
      --muted-2: #97a3b3;
      --border: #d4dded;
      --border-soft: #e6ecf6;
      --radius: 12px;
      --sans: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: var(--sans); background:
        radial-gradient(1000px 560px at 88% -14%, rgba(47,120,208,0.10), transparent 60%),
        radial-gradient(820px 520px at -8% 114%, rgba(200,16,46,0.06), transparent 55%),
        var(--bg); color: var(--text); overflow: hidden; -webkit-font-smoothing:antialiased; }
    header { padding: 13px 26px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:20px; background:linear-gradient(180deg, #ffffff, #f4f7fc); box-shadow:0 1px 0 rgba(16,32,46,0.03), 0 6px 18px -14px rgba(16,32,46,0.25); position:relative; z-index:20; }
    .template-bar { display:flex; gap:8px; padding:8px 0 0; }
    .template-pill { position:relative; flex:1; text-align:center; padding:11px 14px; border:1px solid var(--border); border-radius:10px; cursor:pointer; color:var(--muted); background:var(--panel); font-weight:600; font-size:13px; transition:all .2s cubic-bezier(.2,.7,.3,1); overflow:hidden; }
    .template-pill::before { content:""; position:absolute; inset:0; border-radius:10px; padding:1px; background:linear-gradient(120deg, var(--accent-2), var(--accent), var(--accent-2)); background-size:200% 100%; -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; opacity:0; transition:opacity .25s; }
    .template-pill:hover { color:var(--text); transform:translateY(-1px); box-shadow:0 6px 16px -10px var(--accent-glow); }
    .template-pill.active { color:var(--accent); background:var(--accent-soft); border-color:transparent; box-shadow:0 4px 16px -8px var(--accent-glow); }
    .template-pill.active::before { opacity:1; animation:pillFlow 4s linear infinite; }
    @keyframes pillFlow { to { background-position:200% 0; } }
    #app { display:flex; flex-direction:column; height:100vh; overflow:hidden; }
    .grid { display:grid; grid-template-columns: 420px 1fr; flex:1 1 auto; min-height:0; }
    @media(max-width:1024px){ #app{ height:auto; min-height:100vh; overflow:visible; } .grid{ min-height:0; } }
    .panel { background: linear-gradient(180deg, var(--panel), var(--bg-2)); border-right:1px solid var(--border); padding:20px 20px 60px; overflow-y:auto; }
    .preview { position:relative; background:
        radial-gradient(1300px 700px at 50% -12%, rgba(47,120,208,0.09), transparent 60%),
        linear-gradient(180deg, #eef2f9, #e3e9f3);
        overflow:auto; display:flex; justify-content:center; align-items:flex-start; padding:clamp(14px, 3vw, 40px); }
    .preview > #preview { position:relative; z-index:1; width:100%; }
    /* Message au lieu du vide (quadrillage) quand l'aperçu est vide ou en cours de chargement */
    #preview:empty { display:flex; align-items:center; justify-content:center; min-height:60vh; }
    #preview:empty::before {
      content:"⏳  Chargement de la trame…";
      color:var(--muted); font-size:14.5px; font-weight:600;
      padding:18px 28px; background:var(--panel); border:1px solid var(--border);
      border-radius:14px; box-shadow:0 14px 34px -18px rgba(16,32,46,.4);
      animation:savePulse 1.8s ease-in-out infinite;
    }
    .rapport-wrapper { background:transparent; display:flex; justify-content:center; align-items:flex-start; padding:8px; }
    /* ===== Aperçu — design épuré & futuriste (couleurs institutionnelles) ===== */
    .rapport-page {
      position:relative; background:linear-gradient(180deg, #ffffff, #fbfcff);
      color:#16202e; width:820px; min-height:1120px; padding:52px 54px;
      border-radius:20px; border:1px solid #e4eaf4;
      box-shadow:0 44px 90px -42px rgba(16,40,80,.42), 0 10px 30px -18px rgba(16,40,80,.22), inset 0 0 0 1px rgba(255,255,255,.65);
      font-family:var(--sans); word-wrap:break-word; overflow-wrap:break-word;
    }
    .rapport-page::before { content:""; position:absolute; left:0; right:0; top:0; height:4px; border-radius:20px 20px 0 0; background:linear-gradient(90deg, var(--accent), var(--accent-2) 50%, var(--accent)); opacity:.95; }
    .section {
      position:relative; border:1px solid #e4eaf4; border-radius:16px; margin-bottom:18px; overflow:hidden;
      background:#fff; box-shadow:0 1px 2px rgba(16,40,80,.04), 0 12px 32px -24px rgba(16,40,80,.3);
      transition:box-shadow .28s ease, transform .28s ease, border-color .28s ease;
    }
    .section:hover { box-shadow:0 1px 2px rgba(16,40,80,.05), 0 22px 50px -26px rgba(31,95,176,.42); border-color:#cfdaee; transform:translateY(-2px); }
    .section-title {
      display:flex; align-items:center; gap:11px;
      background:linear-gradient(180deg, #f4f8fd, #e9f1fb);
      color:#152233; font-weight:700; text-align:left; padding:12px 18px;
      border-bottom:1px solid #e4eaf4; font-size:12px; letter-spacing:1px; text-transform:uppercase;
    }
    .section-title::before { content:""; width:9px; height:9px; border-radius:3px; flex:0 0 auto; background:linear-gradient(135deg, var(--accent-2), var(--accent)); box-shadow:0 0 0 4px var(--accent-soft), 0 0 12px var(--accent-glow); }
    .section-body { padding:16px 20px; display:flex; flex-direction:column; gap:9px; font-size:13.5px; line-height:1.6; word-wrap:break-word; overflow-wrap:break-word; }
    .pv-row { display:flex; gap:10px; font-size:13.5px; line-height:23px; padding:3px 0; border-bottom:1px dashed transparent; transition:border-color .2s; }
    .pv-row:hover { border-bottom-color:#eef2f8; }
    .pv-label { font-weight:600; color:var(--accent); letter-spacing:.2px; }
    input, select { width:100%; padding:11px 13px; border-radius:9px; border:1px solid var(--border); background:var(--bg-2); color:var(--text); font-family:var(--sans); font-size:13.5px; transition:border-color .16s, box-shadow .16s, background .16s; }
    input::placeholder, textarea::placeholder { color:var(--muted-2); }
    input:focus, select:focus, textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); background:var(--panel-2); }
    button { padding:12px 14px; border:none; border-radius:10px; background: linear-gradient(135deg, var(--accent-2), var(--accent)); color:#fff; font-weight:700; cursor:pointer; transition:transform .14s ease, box-shadow .22s ease, filter .16s; position:relative; overflow:hidden; }
    button::after { content:""; position:absolute; top:0; left:-130%; width:60%; height:100%; background:linear-gradient(100deg, transparent, rgba(255,255,255,0.45), transparent); transform:skewX(-18deg); transition:none; }
    button:hover { filter:brightness(1.05); box-shadow:0 10px 26px -10px var(--accent-glow); transform:translateY(-2px); }
    button:hover::after { animation:btnSheen .8s ease; }
    button:active { transform:translateY(0); }
    @keyframes btnSheen { from { left:-130%; } to { left:130%; } }
    /* Texte foncé pour les boutons à fond clair en style inline (évite blanc sur clair) */
    button[style*="background:var(--panel-2)"],
    button[style*="background:var(--panel)"],
    button[style*="background:var(--bg-2)"],
    button[style*="background:#fff"],
    button[style*="background: #fff"],
    button[style*="background:white"],
    button[style*="background:var(--accent-soft)"],
    button[style*="background:var(--accent-soft)"],
    button[style*="background:var(--red-soft)"]{ color:var(--text) !important; }
    textarea { width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--border); background:var(--bg-2); color:var(--text); font-family:var(--sans); font-size:13px; }
    .status { font-size:12px; color:var(--muted); margin-top:12px; }

    /* En-têtes de section dans le panneau */
    .panel-section-label { display:flex; align-items:center; gap:11px; font-size:11px; letter-spacing:1.3px; text-transform:uppercase; color:var(--text); font-weight:700; margin:24px 0 16px; }
    .panel-section-label::after { content:""; flex:1; height:1px; background:linear-gradient(90deg, rgba(31,95,176,.35), var(--border) 35%, transparent); }
    .panel-section-label .ix { display:inline-grid; place-items:center; width:30px; height:30px; padding:0; border-radius:10px; font-family:"Consolas","SF Mono",ui-monospace,monospace; font-size:13px; font-weight:800; letter-spacing:0; color:var(--accent); background:var(--accent-soft); border:1px solid rgba(31,95,176,.28); box-shadow:0 0 0 3px rgba(31,95,176,.06), 0 6px 14px -6px var(--accent-glow); }
    .panel-section-label .ix svg { width:17px; height:17px; }

    /* === Grille responsive des variables === */
    .fields-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(min(100%, 230px), 1fr)); gap:18px 18px; align-items:start; }
    .fields-grid > div { display:flex; flex-direction:column; gap:8px; min-width:0; }
    .fields-grid > div label { font-size:13px; color:var(--text); font-weight:600; letter-spacing:.1px; display:flex; align-items:center; gap:8px; }
    .fields-grid > div label::before { content:""; width:7px; height:7px; border-radius:2px; background:linear-gradient(135deg, var(--accent-2), var(--accent)); flex:0 0 auto; box-shadow:0 0 0 3px var(--accent-soft), 0 0 8px -1px var(--accent-glow); }
    .fields-grid input, .fields-grid select, .fields-grid .searchable-input { margin:0; padding:12px 14px; font-size:14px; border-radius:11px; }
    .fields-grid input:focus, .fields-grid select:focus, .fields-grid .searchable-input:focus { box-shadow:0 0 0 3px var(--accent-soft), 0 8px 20px -12px var(--accent-glow); }
    .fields-grid .searchable-select { width:100%; }
    /* Champs longs occupant toute la largeur */
    .fields-grid > div:has(textarea) { grid-column:1 / -1; }
    @media(max-width:520px){ .fields-grid{ grid-template-columns:1fr; } }
    .editable-field { transition: all 0.2s ease; cursor: text; }
    .editable-field:hover { border-bottom-color: var(--accent) !important; background: rgba(31,95,176,0.05); }
    .editable-field:focus { outline: none; border-bottom-color: var(--accent) !important; background: rgba(31,95,176,0.1); }
    .image-drop-zone { min-height: 100px; border: 2px dashed #ccc; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #999; cursor: pointer; transition: all 0.3s ease; margin: 10px 0; }
    .image-drop-zone:hover { border-color: var(--accent); background: rgba(31,95,176,0.05); color: var(--accent); }
    .image-drop-zone.dragover { border-color: var(--accent); background: rgba(31,95,176,0.15); transform: scale(1.02); }
    .image-container { border:1px solid #e4eaf4; border-radius:16px; padding:14px; margin:14px 0; background:linear-gradient(180deg,#fff,#f7faff); box-shadow:0 12px 30px -22px rgba(16,40,80,.4); transition:box-shadow .25s ease, transform .25s ease; }
    .image-container:hover { box-shadow:0 22px 48px -26px rgba(31,95,176,.42); transform:translateY(-2px); }
    .image-preview-wrapper { position: relative; display: inline-block; width: 100%; }
    .image-preview-wrapper img { max-width:100%; border:1px solid #e4eaf4 !important; border-radius:13px !important; display:block; box-shadow:0 10px 26px -18px rgba(16,40,80,.45); }
    /* Numérotation automatique des figures (hors graphiques) */
    .rapport-page { counter-reset: figure; }
    .report-figure { counter-increment: figure; }
    .image-controls { margin-top:10px; padding:10px 12px; background:var(--panel-2); border-radius:11px; border:1px solid var(--border); }
    .image-controls label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight:600; }
    .image-controls input[type="range"] { width: 100%; accent-color: var(--accent); }
    .image-controls textarea { width: 100%; min-height: 60px; font-size: 12px; resize: vertical; }
    .image-controls select { width: 100%; font-size: 12px; padding: 4px; margin-bottom: 6px; }
    .image-remove-btn { position:absolute; top:8px; right:8px; width:26px; height:26px; border:none; border-radius:50%; background:var(--red); color:transparent; font-size:0; cursor:pointer; z-index:10; box-shadow:0 4px 12px -4px rgba(200,16,46,.5); transition:transform .14s, background .16s; display:flex; align-items:center; justify-content:center; }
    .image-remove-btn::before, .image-remove-btn::after { content:""; position:absolute; width:12px; height:2px; border-radius:2px; background:#fff; }
    .image-remove-btn::before { transform:rotate(45deg); }
    .image-remove-btn::after { transform:rotate(-45deg); }
    .image-remove-btn:hover { background:#a50d26; transform:scale(1.1); }

    /* Croix centrée pour TOUS les boutons rouges de suppression (graphiques, tableaux, conv., vidéos) */
    button[style*="#ff4757"] { color:transparent !important; font-size:0 !important; }
    button[style*="#ff4757"]::before, button[style*="#ff4757"]::after { content:""; position:absolute; top:50%; left:50%; width:12px; height:2px; border-radius:2px; background:#fff; }
    button[style*="#ff4757"]::before { transform:translate(-50%,-50%) rotate(45deg); }
    button[style*="#ff4757"]::after { transform:translate(-50%,-50%) rotate(-45deg); }

    /* ===== Toast élégant (style rapport institutionnel) ===== */
    .app-toast { position:fixed; top:22px; right:22px; z-index:100000; display:flex; align-items:center; gap:13px; background:#fff; color:var(--text); padding:13px 20px 13px 14px; border-radius:15px; border:1px solid var(--border); border-left:4px solid var(--accent); box-shadow:0 22px 54px -22px rgba(16,40,80,.5), inset 0 0 0 1px rgba(255,255,255,.6); font-size:13.5px; max-width:380px; animation:toastIn .38s cubic-bezier(.2,.8,.3,1); }
    .app-toast.out { animation:toastOut .3s ease forwards; }
    .app-toast .at-ic { width:36px; height:36px; border-radius:11px; display:grid; place-items:center; background:var(--accent-soft); color:var(--accent); flex:0 0 auto; }
    .app-toast .at-ic svg { width:19px; height:19px; }
    .app-toast .at-text { display:flex; flex-direction:column; gap:2px; min-width:0; }
    .app-toast .at-title { font-weight:700; letter-spacing:-.1px; }
    .app-toast .at-sub { font-size:11.5px; font-weight:500; color:var(--muted); }
    @keyframes toastIn { from{ opacity:0; transform:translateX(46px) scale(.95); } to{ opacity:1; transform:none; } }
    @keyframes toastOut { to{ opacity:0; transform:translateX(46px) scale(.95); } }
    @media(max-width:560px){ .app-toast{ left:14px; right:14px; top:14px; max-width:none; } }

    /* ===== Indicateur de chargement non bloquant (près de la marque) ===== */
    .load-chip { position:fixed; top:28px; left:372px; z-index:60; display:inline-flex; align-items:center; gap:11px; background:#fff; border:1px solid var(--border); border-radius:999px; padding:8px 17px 8px 12px; box-shadow:0 14px 32px -14px rgba(16,40,80,.42); font-size:12.5px; font-weight:600; color:var(--text); animation:toastIn .3s ease; }
    .load-chip .lc-spin { width:16px; height:16px; border:2.5px solid var(--accent-soft); border-top-color:var(--accent); border-radius:50%; animation:appSpin .8s linear infinite; flex:0 0 auto; }
    .load-chip .lc-sub { color:var(--muted); font-weight:500; margin-left:5px; }
    @media(max-width:1100px){ .load-chip{ left:auto; right:16px; top:auto; bottom:16px; } }

    /* ===== Boîte de confirmation custom (remplace confirm() natif) ===== */
    .confirm-overlay { position:fixed; inset:0; background:rgba(12,20,34,.5); backdrop-filter:blur(7px); z-index:100001; display:flex; align-items:center; justify-content:center; padding:24px; animation:xlsFade .18s ease; }
    .confirm-box { width:min(460px, 100%); background:#fff; border:1px solid var(--border); border-radius:20px; box-shadow:0 44px 110px -30px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.6); overflow:hidden; animation:toastIn .32s cubic-bezier(.2,.8,.3,1); }
    .confirm-box .cf-body { padding:28px 28px 10px; display:flex; gap:16px; align-items:flex-start; }
    .confirm-box .cf-ic { width:48px; height:48px; border-radius:14px; display:grid; place-items:center; flex:0 0 auto; background:var(--red-soft); color:var(--red); }
    .confirm-box .cf-ic svg { width:25px; height:25px; }
    .confirm-box .cf-title { font-size:16.5px; font-weight:800; color:var(--text); margin:2px 0 7px; letter-spacing:-.2px; }
    .confirm-box .cf-msg { font-size:13px; line-height:1.6; color:var(--muted); }
    .confirm-box .cf-foot { display:flex; gap:11px; justify-content:flex-end; padding:20px 28px 24px; }
    .confirm-box .cf-cancel { padding:11px 22px; border-radius:11px; border:1px solid var(--border); background:var(--panel-2); color:var(--text); font-weight:600; font-size:13.5px; cursor:pointer; transition:all .15s; }
    .confirm-box .cf-cancel:hover { border-color:var(--muted-2); }
    .confirm-box .cf-ok { padding:11px 22px; border-radius:11px; border:none; background:linear-gradient(135deg,#e0455a,var(--red)); color:#fff; font-weight:700; font-size:13.5px; cursor:pointer; box-shadow:0 10px 24px -10px rgba(200,16,46,.5); transition:transform .14s, filter .15s; }
    .confirm-box .cf-ok:hover { transform:translateY(-1px); filter:brightness(1.05); }
    .confirm-box .cf-ok.safe { background:linear-gradient(135deg,var(--accent-2),var(--accent)); box-shadow:0 10px 24px -10px var(--accent-glow); }

    /* ===== Modals plein écran (+ Tableau / + Tableau Tags) ===== */
    .xls-modal { position:fixed; inset:0; background:rgba(12,20,34,.5); backdrop-filter:blur(8px); z-index:9999; display:flex; align-items:stretch; justify-content:stretch; padding:0; animation:xlsFade .18s ease; }
    @keyframes xlsFade { from{opacity:0} to{opacity:1} }
    .xls-dialog { display:flex; flex-direction:column; width:100vw; height:100vh; border-radius:0; border:none; overflow:hidden;
      /* Exactement le même fond que l'accueil (body) */
      background:
        radial-gradient(1000px 560px at 88% -14%, rgba(47,120,208,0.10), transparent 60%),
        radial-gradient(820px 520px at -8% 114%, rgba(200,16,46,0.06), transparent 55%),
        var(--bg); }
    .xls-head { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 24px; border-bottom:1px solid var(--border); background:linear-gradient(180deg,#ffffff,#f3f8fd); flex:0 0 auto; }
    .xls-title { display:flex; align-items:center; gap:13px; font-size:17px; font-weight:800; color:var(--text); letter-spacing:-.2px; }
    .xls-title .xls-badge { width:40px; height:40px; border-radius:12px; display:grid; place-items:center; background:#fff; border:1px solid var(--border); box-shadow:0 4px 12px -6px rgba(16,40,80,.3); flex:0 0 auto; overflow:hidden; }
    .xls-title .xls-badge svg { width:28px; height:28px; display:block; margin:auto; }
    .xls-title .xls-sub { display:block; font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.3px; margin-top:2px; }
    .xls-close { width:40px; height:40px; border-radius:12px; border:1px solid var(--border); background:var(--panel-2); color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; line-height:0; transition:all .16s; flex:0 0 auto; }
    .xls-close svg { width:18px; height:18px; display:block; }
    .xls-close:hover { background:var(--red-soft); border-color:rgba(200,16,46,.4); color:var(--red); transform:rotate(90deg); }
    .xls-body { flex:1 1 auto; overflow-y:auto; padding:40px 56px 48px; width:100%; max-width:1240px; margin:0 auto; }
    /* Plus de respiration entre les sections du modal */
    .xls-body > div { margin-bottom:26px !important; }
    .xls-body > div:last-child { margin-bottom:0 !important; }
    .xls-foot { flex:0 0 auto; display:flex; gap:14px; justify-content:center; align-items:center; padding:16px 24px; border-top:1px solid var(--border); background:linear-gradient(180deg,#f8fbff,#eaf1fa); }
    .xls-foot button { min-width:170px; justify-content:center; font-size:14px; letter-spacing:.2px; }
    /* Pastille de stats (lignes / colonnes / source) */
    .xls-stats { display:inline-flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); background:var(--panel-2); border:1px solid var(--border); border-radius:999px; padding:6px 14px; font-weight:500; }
    .xls-stats svg { width:14px; height:14px; color:var(--accent); flex:0 0 auto; }
    .xls-stats b { color:var(--text); font-weight:700; }
    .xls-stats .xls-dot { width:4px; height:4px; border-radius:50%; background:var(--muted-2); flex:0 0 auto; }
    .xls-clearbtn { padding:6px 12px; font-size:11px; font-weight:600; background:var(--red-soft); color:var(--red); border:1px solid rgba(200,16,46,.3); border-radius:999px; cursor:pointer; transition:all .15s; }
    .xls-clearbtn:hover { background:rgba(200,16,46,.16); }
    .xls-fsbtn { display:inline-flex; align-items:center; gap:7px; padding:7px 14px; font-size:12px; font-weight:600; background:var(--accent-soft); color:var(--accent); border:1px solid rgba(31,95,176,.3); border-radius:999px; cursor:pointer; transition:all .15s; white-space:nowrap; }
    .xls-fsbtn:hover { background:rgba(31,95,176,.16); border-color:var(--accent); }
    .xls-fsbtn svg { width:15px; height:15px; }
    /* Petite croix épurée de suppression de colonne (en-tête de tableau) */
    .col-x { position:relative; width:21px; height:21px; flex:0 0 auto; border-radius:7px; border:1px solid rgba(31,95,176,.25); background:var(--accent-soft); color:var(--accent); cursor:pointer; padding:0; display:inline-flex; align-items:center; justify-content:center; box-shadow:none; }
    .col-x::before, .col-x::after { content:""; position:absolute; top:50%; left:50%; width:10px; height:1.8px; border-radius:2px; background:currentColor; }
    .col-x::before { transform:translate(-50%,-50%) rotate(45deg); }
    .col-x::after { transform:translate(-50%,-50%) rotate(-45deg); }
    .col-x:hover { background:var(--red-soft); border-color:rgba(200,16,46,.4); color:var(--red); }
    /* Mode aperçu : le tableau prend tout le modal, la config se replie */
    .xls-dialog.previewing #sheetSelectSection,
    .xls-dialog.previewing #columnsSection,
    .xls-dialog.previewing #maxRowsSection,
    .xls-dialog.previewing #tagsSheetSelectSection,
    .xls-dialog.previewing #tagsColumnsSection,
    .xls-dialog.previewing #tagsMaxRowsSection,
    .xls-dialog.previewing #tableLoadStatus,
    .xls-dialog.previewing #tagsTableLoadStatus { display:none !important; }
    .xls-dialog.previewing #previewSection,
    .xls-dialog.previewing #tagsPreviewSection { margin:0 !important; }
    .xls-dialog.previewing #previewSection > label,
    .xls-dialog.previewing #tagsPreviewSection > label { display:none; }
    /* Le tableau occupe toute la largeur de l'interface (plus de marges centrées) */
    .xls-dialog.previewing .xls-body { max-width:none !important; padding:14px 18px 18px !important; }
    .xls-dialog.previewing #tablePreview,
    .xls-dialog.previewing #tagsTablePreview { max-height:calc(100vh - 215px) !important; border-radius:12px; }
    /* Barre de défilement claire et confortable pour parcourir les colonnes */
    #tablePreview::-webkit-scrollbar, #tagsTablePreview::-webkit-scrollbar { height:13px; width:13px; }
    #tablePreview::-webkit-scrollbar-thumb, #tagsTablePreview::-webkit-scrollbar-thumb { background:var(--muted-2); border-radius:20px; border:3px solid var(--bg-2); }
    #tablePreview::-webkit-scrollbar-thumb:hover, #tagsTablePreview::-webkit-scrollbar-thumb:hover { background:var(--accent); }
    #tablePreview::-webkit-scrollbar-track, #tagsTablePreview::-webkit-scrollbar-track { background:var(--bg-2); border-radius:20px; }

    /* ===== Vue tableau plein écran (page dédiée) ===== */
    .tblfs-overlay { position:fixed; inset:0; z-index:100003; background:
        radial-gradient(1100px 600px at 50% -12%, rgba(47,120,208,0.09), transparent 60%),
        linear-gradient(180deg, #eef2f9, #e3e9f3); display:flex; flex-direction:column; animation:xlsFade .18s ease; }
    .tblfs-head { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 30px; border-bottom:1px solid var(--border); background:linear-gradient(180deg,#fff,#f3f8fd); flex:0 0 auto; }
    .tblfs-title { display:flex; align-items:baseline; gap:12px; min-width:0; }
    .tblfs-title b { font-size:17px; font-weight:800; color:var(--text); }
    .tblfs-title span { font-size:12px; color:var(--muted); white-space:nowrap; }
    .tblfs-close { width:40px; height:40px; border-radius:12px; border:1px solid var(--border); background:var(--panel-2); color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .16s; flex:0 0 auto; }
    .tblfs-close svg { width:18px; height:18px; }
    .tblfs-close:hover { background:var(--red-soft); border-color:rgba(200,16,46,.4); color:var(--red); transform:rotate(90deg); }
    .tblfs-body { flex:1 1 auto; overflow:auto; padding:26px 30px 36px; }
    .tblfs-table { width:100%; border-collapse:separate; border-spacing:0; font-size:13.5px; table-layout:fixed; background:#fff; border:1px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:0 20px 50px -30px rgba(16,40,80,.4); }
    .tblfs-table th { position:sticky; top:0; z-index:2; text-align:left; padding:14px 15px; background:linear-gradient(135deg,var(--accent-2),var(--accent)); color:#fff; font-weight:700; font-size:11px; letter-spacing:.6px; text-transform:uppercase; word-break:break-word; }
    .tblfs-table td { padding:13px 15px; border-bottom:1px solid #eef2f8; color:#16202e; word-break:break-word; vertical-align:top; line-height:1.5; }
    .tblfs-table tbody tr:nth-child(even) td { background:#f6f9fd; }
    .tblfs-table tbody tr:hover td { background:var(--accent-soft); }
    .tblfs-table td.nc { color:var(--muted-2); font-style:italic; }

    /* ===== Modal médias tagués (+Tags Photos / Vidéos) ===== */
    .tm-head { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:8px; }
    .tm-title { display:flex; align-items:center; gap:13px; font-size:17px; font-weight:800; color:var(--text); }
    .tm-title .tm-ic { width:40px; height:40px; border-radius:12px; display:grid; place-items:center; flex:0 0 auto; background:var(--accent-soft); color:var(--accent); }
    .tm-title .tm-ic svg { width:22px; height:22px; }
    .tm-title .tm-sub { display:block; font-size:11px; font-weight:500; color:var(--muted); letter-spacing:.2px; margin-top:3px; }
    .tm-actions { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .tm-count { font-size:12px; font-weight:600; color:var(--accent); background:var(--accent-soft); border:1px solid rgba(31,95,176,.25); padding:5px 12px; border-radius:999px; white-space:nowrap; }
    .tm-btn { padding:9px 16px; border-radius:10px; font-weight:600; font-size:13px; cursor:pointer; border:1px solid var(--border); background:var(--panel-2); color:var(--text); transition:all .15s; }
    .tm-btn:hover { border-color:var(--muted-2); }
    .tm-btn.primary { border:none; background:linear-gradient(135deg,var(--accent-2),var(--accent)); color:#fff; box-shadow:0 8px 20px -10px var(--accent-glow); }
    .tm-btn.primary:hover { filter:brightness(1.05); }
    .tm-close { width:40px; height:40px; border-radius:12px; border:1px solid var(--border); background:var(--panel-2); color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .16s; }
    .tm-close svg { width:18px; height:18px; }
    .tm-close:hover { background:var(--red-soft); border-color:rgba(200,16,46,.4); color:var(--red); transform:rotate(90deg); }
    .tags-media-item { background:#fff; }
    .tags-media-item:hover { border-color:var(--accent) !important; box-shadow:0 12px 30px -20px rgba(31,95,176,.4); }
    .tm-info { flex:1; display:flex; flex-direction:column; gap:9px; min-width:0; }
    .tm-name { font-size:14px; font-weight:700; color:var(--text); word-break:break-word; }
    .tm-meta { display:flex; flex-wrap:wrap; gap:8px; }
    .tm-chip { display:inline-flex; align-items:center; gap:7px; max-width:100%; font-size:11.5px; color:var(--muted); background:var(--panel-2); border:1px solid var(--border); border-radius:9px; padding:5px 11px; }
    .tm-chip svg { width:14px; height:14px; flex:0 0 auto; color:var(--accent); }
    .tm-chip span { font-family:"Consolas","SF Mono",ui-monospace,monospace; color:var(--text); word-break:break-all; }
    .tm-chip.date span { font-family:var(--sans); }
    .tm-obs { margin-top:4px; }
    .tm-obs label { display:block; font-size:11px; font-weight:600; color:var(--muted); margin-bottom:5px; letter-spacing:.3px; }
    .tm-obs textarea { width:100%; min-height:58px; padding:10px 12px; border:1px solid var(--border); border-radius:10px; background:var(--bg-2); color:var(--text); font-size:12.5px; resize:vertical; font-family:var(--sans); }
    .tm-obs textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }

    /* Infos d'une image insérée (chemin / date / observations) — épuré */
    .img-meta { display:flex; flex-direction:column; gap:8px; min-width:0; flex:1; }
    .img-meta .tm-chip { align-self:flex-start; max-width:100%; }
    .img-obs { background:var(--panel-2); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:10px; padding:10px 12px; font-size:12.5px; line-height:1.5; color:var(--text); word-break:break-word; }
    .img-obs .img-obs-label { display:block; font-size:10px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--accent); margin-bottom:4px; }
    /* Champs & bordures épurés à l'intérieur des modals */
    .xls-body input, .xls-body select, .xls-body textarea { border-radius:10px; }
    .xls-body table { border-collapse:separate; border-spacing:0; }
    .xls-body table th, .xls-body table td { border-color:var(--border) !important; }
    @media(max-width:680px){ .xls-modal{ padding:0; } .xls-dialog{ width:100vw; height:100vh; max-width:none; border-radius:0; } .xls-head{ padding:14px 16px; } .xls-body{ padding:16px; } }
    .text-position-btns { display: flex; gap: 4px; margin-bottom: 6px; }
    .text-position-btns button { flex: 1; padding: 4px; font-size: 11px; }
    @media(max-width:1024px){ .grid{grid-template-columns:1fr; height:auto; overflow:auto;} .preview{min-height:60vh;} .panel{border-right:none; border-bottom:1px solid var(--border);} header{flex-wrap:wrap;} }
    @media(max-width:560px){ .fields-grid{grid-template-columns:1fr 1fr;} header{padding:12px 16px;} .panel{padding:16px 16px 60px;} }

    /* Searchable dropdown custom */
    .searchable-select { position: relative; width: 100%; }
    .searchable-input { width: 100%; padding: 11px 13px; border-radius: 9px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text); cursor: text; font-size:13.5px; }
    .searchable-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .searchable-dropdown { position: absolute; top: 100%; left: 0; right: 0; max-height: 250px; overflow-y: auto; background: var(--elev); border: 1px solid var(--accent); border-radius: 9px; margin-top: 4px; z-index: 1000; display: none; box-shadow: 0 12px 30px rgba(0,0,0,0.5); }
    .searchable-select.open .searchable-dropdown { display: block; }
    .searchable-option { padding: 10px 14px; cursor: pointer; color: var(--text); font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.15s; }
    .searchable-option:last-child { border-bottom: none; }
    .searchable-option:hover, .searchable-option.highlighted { background: var(--accent-soft); color: var(--accent-2); }
    .searchable-option.hidden { display: none; }
    .searchable-dropdown::-webkit-scrollbar { width: 8px; }
    .searchable-dropdown::-webkit-scrollbar-track { background: var(--bg-2); border-radius: 4px; }
    .searchable-dropdown::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

    /* ===== Conversation sur maquette smartphone ===== */
    .conversation-container {
      position:relative; display:flex; flex-direction:column; gap:9px;
      width:340px; max-width:100%; margin:16px auto; padding:18px 14px 26px;
      background:
        radial-gradient(120% 60% at 50% 0%, rgba(31,95,176,.06), transparent 60%),
        linear-gradient(180deg, #f6f9fd, #eef3fa);
      border:11px solid #10151e; border-radius:46px;
      box-shadow:0 0 0 2px #2b3650, 0 28px 56px -22px rgba(16,32,46,.55), inset 0 1px 3px rgba(0,0,0,.16);
      max-height:600px; overflow-y:auto; scrollbar-width:none;
    }
    .conversation-container::-webkit-scrollbar { display:none; }
    /* grille de haut-parleur (reste épinglée en haut de l'écran) */
    .conversation-container::before {
      content:""; position:sticky; top:0; align-self:center; flex:0 0 auto;
      width:52px; height:6px; border-radius:4px; background:#c2ccda; margin-bottom:8px; z-index:3;
    }
    .message-bubble { max-width:78%; padding:9px 13px; border-radius:18px; font-size:13px; line-height:1.42; position:relative; box-shadow:0 1px 2px rgba(16,32,46,.12); }
    .message-bubble.owner { align-self:flex-end; background:linear-gradient(135deg, var(--accent-2), var(--accent)); color:#fff; border-bottom-right-radius:6px; }
    .message-bubble.other { align-self:flex-start; background:#fff; color:#16202e; border:1px solid #e2e8f2; border-bottom-left-radius:6px; }
    .message-bubble .sender { font-weight:700; font-size:10.5px; margin-bottom:3px; opacity:.85; }
    .message-bubble .timestamp { font-size:9.5px; opacity:.65; margin-top:4px; text-align:right; }
    .message-bubble.other .timestamp { color:#6b7686; }
    .message-bubble .attachment { background:rgba(0,0,0,0.06); padding:6px 10px; border-radius:8px; margin-top:6px; font-size:11px; }
    .message-bubble.owner .attachment { background:rgba(255,255,255,0.2); }

    /* Message avec commentaires (rapport) — capture posée comme sur un écran */
    .message-with-comment { display:flex; gap:14px; margin-bottom:14px; align-items:center; padding:14px; background:#fff; border:1px solid #e4eaf4; border-radius:16px; box-shadow:0 10px 28px -22px rgba(16,40,80,.4); }
    .message-with-comment.reverse { flex-direction:row-reverse; }
    .message-image-container { flex:0 0 auto; max-width:300px; position:relative; }
    .message-image-container img { max-width:100%; border-radius:14px; border:1px solid #e4eaf4; box-shadow:0 8px 22px -16px rgba(16,40,80,.4); display:block; }

    /* ===== Maquette smartphone (conversation dans le rapport) ===== */
    .phone-conv { width:384px; max-width:100%; margin:20px auto; position:relative; }
    .phone-frame { position:relative; background:#0e131c; border-radius:50px; padding:30px 12px 16px; box-shadow:0 0 0 2px #2b3650, 0 36px 72px -30px rgba(16,32,46,.6); }
    .phone-notch { position:absolute; top:13px; left:50%; transform:translateX(-50%); width:132px; height:24px; background:#0e131c; border-radius:0 0 17px 17px; z-index:5; }
    .phone-inner { border-radius:32px; overflow:hidden; box-shadow:0 0 0 2px #1b2436; background:#fff; }
    .phone-appbar { display:flex; align-items:center; gap:11px; padding:13px 15px; background:linear-gradient(180deg,#ffffff,#f3f8fd); border-bottom:1px solid #e7edf6; position:relative; z-index:2; }
    .phone-appbar .pa-back { color:var(--accent); font-size:23px; font-weight:700; line-height:1; margin-right:-3px; }
    .phone-appbar .pa-avatar { width:36px; height:36px; border-radius:50%; flex:0 0 auto; background:linear-gradient(135deg,var(--accent-2),var(--accent)); color:#fff; display:grid; place-items:center; font-size:14px; font-weight:700; box-shadow:0 4px 10px -4px var(--accent-glow); }
    .phone-appbar .pa-meta { flex:1; min-width:0; }
    .phone-appbar .pa-name { font-size:14px; font-weight:700; color:#16202e; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .phone-appbar .pa-sub { font-size:10.5px; color:var(--accent); display:flex; align-items:center; gap:5px; }
    .phone-appbar .pa-sub::before { content:""; width:6px; height:6px; border-radius:50%; background:#2ec27e; box-shadow:0 0 6px #2ec27e; }
    .phone-screen { background:linear-gradient(180deg,#eaf1f9,#e3ecf6); padding:16px 13px; max-height:540px; overflow-y:auto; scrollbar-width:none; }
    .phone-screen::-webkit-scrollbar { display:none; }
    .phone-screen .message-with-comment { background:rgba(255,255,255,.7); backdrop-filter:blur(4px); }

    /* ===== Conversation : carte résumé + vue plein écran ===== */
    .conv-summary { position:relative; display:flex; align-items:center; gap:14px; margin:16px 0; padding:14px 16px; background:linear-gradient(180deg,#fff,#f7faff); border:1px solid #e4eaf4; border-radius:16px; box-shadow:0 12px 30px -22px rgba(16,40,80,.4); transition:box-shadow .25s ease, transform .25s ease; }
    .conv-summary:hover { box-shadow:0 20px 44px -24px rgba(31,95,176,.4); transform:translateY(-1px); }
    .conv-summary .cs-avatar { width:48px; height:48px; border-radius:50%; flex:0 0 auto; display:grid; place-items:center; font-weight:800; font-size:16px; color:#fff; background:linear-gradient(135deg,var(--accent-2),var(--accent)); box-shadow:0 6px 14px -6px var(--accent-glow); }
    .conv-summary .cs-meta { flex:1; min-width:0; }
    .conv-summary .cs-name { font-weight:700; font-size:14.5px; color:#16202e; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .conv-summary .cs-sub { font-size:12px; color:var(--muted); margin-top:2px; }
    .conv-summary .cs-source { color:var(--accent); font-weight:600; }
    .conv-summary .cs-open { flex:0 0 auto; display:inline-flex; align-items:center; gap:8px; padding:10px 17px; border:none; border-radius:11px; background:linear-gradient(135deg,var(--accent-2),var(--accent)); color:#fff; font-weight:600; font-size:13px; cursor:pointer; box-shadow:0 8px 20px -10px var(--accent-glow); transition:transform .14s, filter .15s; }
    .conv-summary .cs-open:hover { transform:translateY(-1px); filter:brightness(1.05); }
    .conv-summary .cs-open svg { width:17px; height:17px; }
    .conv-summary .cs-remove { position:relative; flex:0 0 auto; width:30px; height:30px; border:none; border-radius:50%; background:var(--red-soft); cursor:pointer; transition:background .15s; }
    .conv-summary .cs-remove::before, .conv-summary .cs-remove::after { content:""; position:absolute; top:50%; left:50%; width:11px; height:2px; border-radius:2px; background:var(--red); }
    .conv-summary .cs-remove::before { transform:translate(-50%,-50%) rotate(45deg); }
    .conv-summary .cs-remove::after { transform:translate(-50%,-50%) rotate(-45deg); }
    .conv-summary .cs-remove:hover { background:var(--red); }
    .conv-summary .cs-remove:hover::before, .conv-summary .cs-remove:hover::after { background:#fff; }
    .conv-modal { position:fixed; inset:0; z-index:100002; background:rgba(12,20,34,.5); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; padding:24px; animation:xlsFade .18s ease; }
    .conv-modal-panel { display:flex; flex-direction:column; width:min(980px, 100%); height:min(920px, 94vh); background:#fff; border:1px solid var(--border); border-radius:22px; box-shadow:0 50px 120px -36px rgba(0,0,0,.55); overflow:hidden; animation:toastIn .3s cubic-bezier(.2,.8,.3,1); }
    .conv-modal-head { display:flex; align-items:center; gap:12px; padding:14px 18px; border-bottom:1px solid var(--border); background:linear-gradient(180deg,#fff,#f3f8fd); flex:0 0 auto; }
    .conv-modal-head .pa-back { color:var(--accent); font-size:24px; font-weight:700; line-height:1; }
    .conv-modal-head .cm-avatar { width:40px; height:40px; border-radius:50%; display:grid; place-items:center; font-weight:800; font-size:15px; color:#fff; background:linear-gradient(135deg,var(--accent-2),var(--accent)); flex:0 0 auto; }
    .conv-modal-head .cm-meta { flex:1; min-width:0; }
    .conv-modal-head .cm-name { font-weight:800; font-size:15px; color:#16202e; }
    .conv-modal-head .cm-sub { font-size:11.5px; color:var(--accent); }
    .conv-modal-head .cm-close { width:40px; height:40px; border-radius:12px; border:1px solid var(--border); background:var(--panel-2); color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .16s; flex:0 0 auto; }
    .conv-modal-head .cm-close svg { width:18px; height:18px; }
    .conv-modal-head .cm-close:hover { background:var(--red-soft); border-color:rgba(200,16,46,.4); color:var(--red); transform:rotate(90deg); }
    .conv-modal-body { flex:1 1 auto; overflow-y:auto; padding:24px 28px; background:linear-gradient(180deg,#eef2f9,#e7edf6); }
    @media(max-width:680px){ .conv-modal{ padding:0; } .conv-modal-panel{ width:100vw; height:100vh; border-radius:0; } .conv-summary{ flex-wrap:wrap; } .conv-summary .cs-open{ flex:1; justify-content:center; } }

    /* ===== Cartes SIM — design épuré & responsive ===== */
    .sim-card { margin-bottom:16px; border:1px solid #e4eaf4; border-radius:16px; overflow:hidden; background:#fff; box-shadow:0 12px 30px -22px rgba(16,40,80,.4); transition:box-shadow .25s ease, transform .25s ease; }
    .sim-card:hover { box-shadow:0 20px 44px -24px rgba(31,95,176,.4); transform:translateY(-1px); }
    .sim-card-head { display:flex; align-items:center; gap:11px; padding:12px 16px; font-weight:700; font-size:13.5px; letter-spacing:.2px; color:#fff; background:linear-gradient(135deg, var(--accent-2), var(--accent)); }
    .sim-card-head .sim-ic { width:32px; height:32px; border-radius:10px; display:grid; place-items:center; background:rgba(255,255,255,.18); flex:0 0 auto; }
    .sim-card-head .sim-ic svg { width:19px; height:19px; color:#fff; display:block; }
    .sim-card-head .sim-rm { margin-left:auto; background:rgba(255,255,255,.2); color:#fff; border:none; border-radius:9px; padding:5px 13px; font-size:12px; font-weight:600; cursor:pointer; transition:background .15s; }
    .sim-card-head .sim-rm:hover { background:rgba(255,255,255,.34); }
    .sim-card-body { overflow-x:auto; scrollbar-width:thin; }
    .sim-card-body::-webkit-scrollbar { height:9px; }
    .sim-card-body::-webkit-scrollbar-thumb { background:var(--muted-2); border-radius:20px; border:2px solid #fff; }
    .sim-card-body::-webkit-scrollbar-thumb:hover { background:var(--accent); }
    .sim-card-body::-webkit-scrollbar-track { background:#f4f8fc; }

      to {
        transform: translateX(0);
        opacity: 1;
      }

    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(400px);
        opacity: 0;
      }

      height: 18px;

      vertical-align: middle;

    // Fonction pour obtenir les phrases d'un titre (avec fallback sur PREDEFINED_PHRASES)
    const normalizeApostrophe = (str) => str.replace(/[''ʼ]/g, "'").toLowerCase();
    const normalizeSearchText = (str) =>
      normalizeApostrophe(String(str || ""))
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    const getPlatformsForHeading = (title) => {
      const t = normalizeSearchText(title);
      if (t.includes("contacts")) return state.platformsData?.contacts || [];
      if (
        t.includes("journal d appel") ||
        t.includes("journal appels") ||
        t.includes("journal appel") ||
        t.includes("appels") ||
        t.includes("appel")
      ) return state.platformsData?.calls || [];
      if (
        t.includes("sms mms messageries et chats") ||
        t.includes("sms mms messageries chats") ||
        t.includes("messageries et chats") ||
        t.includes("messageries chats") ||
        t.includes("chats")
      ) return state.platformsData?.chats || [];

        t.includes("comptes associes") ||
        t.includes("comptes associés") ||
        t.includes("compte associe") ||
        t.includes("user accounts") ||
        t.includes("accounts")
      ) return state.platformsData?.accounts || [];
      return [];
    };
    const PLATFORM_KEY_PREFIX = "__PLATFORM__|||";
    const getPlatformContentKey = (parentHeadingTitle, subtitleTitle) =>
      `${PLATFORM_KEY_PREFIX}${parentHeadingTitle || ""}|||${subtitleTitle || ""}`;
    const isContactsHeadingTitle = (title) => {
      const t = normalizeApostrophe(title || "").toLowerCase();
      return t.includes("contact");
    };
    const isCallLogHeadingTitle = (title) => {
      const t = normalizeApostrophe(title || "").toLowerCase();
      return t.includes("appel") || t.includes("call");
    };
    const isChatsHeadingTitle = (title) => {
      const t = normalizeApostrophe(title || "").toLowerCase();
      return t.includes("message") || t.includes("chat") || t.includes("conversation");
    };
    const isUserAccountsHeadingTitle = (title) => {
      const t = normalizeApostrophe(title || "").toLowerCase();
      return t.includes("compte") || t.includes("account");
    };
    const isInstalledAppsHeadingTitle = (title) => {
      const t = normalizeApostrophe(title || "").toLowerCase();
      const result = t.includes("applications install") || t.includes("application install") || t.includes("installed app");
      console.log("[DEBUG isInstalledAppsHeadingTitle] title:", title, "normalized:", t, "result:", result);
      return result;
    };

    // Nouvelles fonctions pour les sections médias et réseau
    const isImagesHeadingTitle = (title) => {
      const t = normalizeApostrophe(title || "").toLowerCase();
      return (t.includes("image") || t.includes("photo")) && !t.includes("hash");
    };
    const isVideosHeadingTitle = (title) => {
      const t = normalizeApostrophe(title || "").toLowerCase();
      return t.includes("vidéo") || t.includes("video");
    };
    const isAudiosHeadingTitle = (title) => {
      const t = normalizeApostrophe(title || "").toLowerCase();

      const t = normalizeApostrophe(title || "").toLowerCase();
      return t.includes("favori") || t.includes("bookmark");

      const t = normalizeApostrophe(title || "").toLowerCase();

      return t.includes("document");

    const isSourceFilterableSection = (title) => {
      return isContactsHeadingTitle(title) || isCallLogHeadingTitle(title) || isChatsHeadingTitle(title) || isUserAccountsHeadingTitle(title);
    };

    // Déterminer le type de feuille à forcer selon le titre
    const getSheetTypeForTitle = (title) => {
      if (isContactsHeadingTitle(title)) return "contacts";

      if (isChatsHeadingTitle(title)) return "chats";
      if (isUserAccountsHeadingTitle(title)) return "useraccounts";

      if (isImagesHeadingTitle(title)) return "images";
      if (isVideosHeadingTitle(title)) return "videos";
      if (isAudiosHeadingTitle(title)) return "audios";
      if (isFavorisHeadingTitle(title)) return "webbookmarks";
      if (isHistoriquesHeadingTitle(title)) return "webhistory";
      if (isWifiHeadingTitle(title)) return "networkconnections";
      if (isBluetoothHeadingTitle(title)) return "bluetooth";
      if (isRecherchesHeadingTitle(title)) return "searcheditems";
      if (isDocumentsHeadingTitle(title)) return "documents";
      return null;
    };

    // Extraire le nom de la plateforme d'un titre comme "2.3.1 WhatsApp" ou "Contacts WhatsApp"
    const extractPlatformFromTitle = (title) => {
      if (!title) return "";
      // Supprimer la numérotation au début (ex: "2.3.1 " ou "2.3.1. ")
      let clean = title.replace(/^[\d.]+\s*/, "").trim();
      // Si le titre contient "Contacts", "Appels", "Messages", "Comptes", etc., extraire ce qui suit
      const prefixes = ["contacts", "appels", "appel", "call log", "calls", "messages", "chats", "conversations", "comptes associés", "comptes", "accounts", "user accounts"];
      const lower = clean.toLowerCase();
      for (const prefix of prefixes) {
        if (lower.startsWith(prefix + " ")) {
          return clean.substring(prefix.length).trim();
        }
        if (lower.startsWith(prefix)) {
          return clean.substring(prefix.length).trim();
        }
      }
      // Sinon, retourner le titre nettoyé (c'est peut-être directement "WhatsApp")
      return clean;
    };

    const buildContactsPlatformPhrase = (subtitleTitle) =>

      const platformKey = getPlatformContentKey(parentHeadingTitle, subtitleTitle);
      if (!state.headingContent[platformKey]) state.headingContent[platformKey] = [];
      const expectedText = buildContactsPlatformPhrase(subtitleTitle);
      const hasSameText = state.headingContent[platformKey].some(
        (b) => b && b.type === "text" && String(b.content || "").trim() === expectedText

      if (!hasSameText) {
        state.headingContent[platformKey].unshift({ type: "text", content: expectedText });
      }
    };

    // === AUTO-ASSOCIATION TABLEAUX POUR TEMPLATES ===
    const autoAssociateTablesForTemplate = async () => {
      if (!state.excelSheets || state.excelSheets.length === 0) return;

      console.log("[AUTO-ASSOC] Template:", state.template, "Feuilles:", state.excelSheets);

      // Pour test2 (SIM): stocker les tableaux dans state.simTables (sections hardcodées)
      if (state.template === "test2") {
        const simSheets = ["Contacts", "SIM Data"];
        for (const sheet of state.excelSheets) {
          if (!simSheets.includes(sheet)) continue;
          if (state.simTables[sheet]) continue; // Déjà chargé

          try {
            const res = await fetch(`/api/sheet-preview/${encodeURIComponent(sheet)}?max_rows=100`);
            if (!res.ok) continue;

            const data = await res.json();
            if (!data.success || !data.data || data.data.length === 0) continue;

            state.simTables[sheet] = {
              columns: data.columns || Object.keys(data.data[0]),
              data: data.data
            };
            console.log(`[AUTO-ASSOC SIM] Tableau "${sheet}" chargé (${data.data.length} lignes)`);
          } catch (err) {
            console.error(`[AUTO-ASSOC SIM] Erreur chargement ${sheet}:`, err);
          }
        }

        // Extraire l'opérateur depuis "Device Info" (Name=SPN, Value=opérateur)
        if (state.excelSheets.includes("Device Info")) {
          try {
            const res = await fetch(`/api/sheet-preview/${encodeURIComponent("Device Info")}?max_rows=100`);
            if (res.ok) {
              const data = await res.json();
              if (data.success && data.data && data.data.length > 0) {
                // Chercher la ligne où Name = "SPN"
                const spnRow = data.data.find(row => row["Name"] === "SPN" || row["name"] === "SPN");
                if (spnRow) {
                  const operateur = spnRow["Value"] || spnRow["value"] || "";
                  if (operateur) {
                    state.values["{operateur}"] = operateur;
                    console.log(`[AUTO-ASSOC SIM] Opérateur extrait depuis Device Info: "${operateur}"`);
                  }
                }
              }
            }
          } catch (err) {
            console.error("[AUTO-ASSOC SIM] Erreur extraction opérateur:", err);
          }
        }

        return; // Pour test2, on utilise simTables, pas headingContent
      }

      // Auto-association désactivée pour test et test3
      // Les tableaux seront ajoutés manuellement par l'utilisateur si nécessaire
    };

    // Fonction pour rendre les tableaux SIM (pour test2)
    const renderSimTables = () => {
      if (!state.simTables || Object.keys(state.simTables).length === 0) {
        return '';
      }

      let html = '';
      for (const [sheetName, tableData] of Object.entries(state.simTables)) {
        if (!tableData || !tableData.data || tableData.data.length === 0) continue;

        html += `
          <div class="section" style="margin-top:15px;">
            <div class="section-title">${escapeHtml(sheetName)}</div>
            <div class="section-body">
              <div style="overflow-x:auto;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.15);">

                  <thead>
                    <tr style="background:linear-gradient(135deg, var(--accent-2), var(--accent));">
                      ${tableData.columns.map(col => `<th style="text-align:left;padding:8px 10px;color:#fff;font-weight:600;border-bottom:2px solid var(--accent);white-space:nowrap;">${escapeHtml(col)}</th>`).join('')}
                    </tr>
                  </thead>
                  <tbody>

                      <tr style="background:${i % 2 === 0 ? '#fff' : '#f8fafc'};">
                        ${tableData.columns.map(col => `<td style="padding:6px 10px;border-bottom:1px solid #e2e8f0;white-space:nowrap;">${escapeHtml(String(row[col] || ''))}</td>`).join('')}
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        `;
      }
      return html;

    // === JOURNAL D'APPEL / CALL LOG ===
    // Construire le contenu formaté pour le journal d'appels d'une plateforme
    const buildCallLogContent = (sourceTitle, callLogData) => {
      if (!callLogData || !callLogData.kpis) {
        return `Les investigations révèlent des traces d'appels pour la plateforme ${sourceTitle}.`;
      }

      const kpis = callLogData.kpis;
      const nbEntrant = kpis.nbappelentrant || 0;
      const nbSortant = kpis.nbappelsortant || 0;
      const timeDebut = kpis.timedebut || "N/C";
      const timeFin = kpis.timefin || "N/C";

      return `Les investigations révèlent les traces de ${nbEntrant} appels entrants et ${nbSortant} appels sortants, les communications s'étendent sur la période du ${timeDebut} au ${timeFin}.`;
    };

    // Construire la phrase pour le graphique top 15 nombre d'appels
    const buildCallLogTop15CountPhrase = (sourceTitle) =>

    const buildCallLogTop15DurationPhrase = (sourceTitle) =>

    const buildCallLogTablePhrase = () =>

    // === CHATS / MESSAGERIES ===
    // Construire le contenu formaté pour les chats d'une plateforme
    const buildChatsContent = (sourceTitle, chatsData) => {

        return `Les investigations révèlent des traces de messages pour la plateforme ${sourceTitle}.`;
      }
      const nbContacts = chatsData.count || 0;
      const totalMessages = chatsData.top15.reduce((sum, c) => sum + (c.Nombre_messages || 0), 0);
      return `Les investigations révèlent des traces de ${totalMessages} messages échangés avec ${nbContacts} contacts sur la plateforme ${sourceTitle}.`;

    // Construire la phrase pour le graphique top 15 messages
    const buildChatsTop15CountPhrase = (sourceTitle) =>
      `Ce graphique représente le top 15 des messages pour la plateforme ${sourceTitle} :`;

    // Construire la phrase pour le tableau résumé des chats
    const buildChatsTablePhrase = () =>

    // === COMPTES ASSOCIÉS / USER ACCOUNTS ===
    // Mapping des sources vers les titres affichés
    const getUserAccountsDisplayTitle = (sourceTitle) => {
      const t = (sourceTitle || "").toLowerCase().trim();
      if (t === "accounts") return "Compte utilisateur";
      return sourceTitle; // Garder le nom original pour les autres (TikTok, Instagram, etc.)
    };

    // Mapping des Service Types vers les noms de compte
    const getAccountTypeFromServiceType = (serviceType) => {
      const t = (serviceType || "").toLowerCase().trim();
      if (t.includes("apple") || t === "icloud" || t === "itunes store" || t === "game center") return "Apple";
      if (t.includes("google")) return "Google";
      // Nettoyer les identifiants de package (com.xxx.yyy -> nom lisible)
      if (t.includes("facebook") || t.includes("messenger")) return "Messenger";
      if (t.includes("whatsapp")) return "WhatsApp";
      if (t.includes("instagram")) return "Instagram";
      if (t.includes("tiktok")) return "TikTok";
      if (t.includes("snapchat")) return "Snapchat";

      if (imagePath.startsWith('data:')) return imagePath;
      try {
        const response = await fetch(imagePath);
        if (!response.ok) return null;
        const blob = await response.blob();
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result);

    // Calculer la numérotation hiérarchique pour les headings (ex: 1., 1.1, 1.1.1)

    const computeHeadingNumbers = ()=>{
      const numbers = [];
      const counters = [0, 0, 0, 0, 0]; // Compteurs pour niveaux 1-5

      for(let i = 0; i < state.headings.length; i++){
        const level = state.headingLevels[i] || 1;
        const title = state.headings[i] || "";

        // Incrémenter le compteur du niveau actuel
        counters[level - 1]++;

        // Réinitialiser les compteurs des niveaux inférieurs
        for(let j = level; j < counters.length; j++){
          counters[j] = 0;
        }

        // Compter les plateformes de ce heading (qui occupent le niveau inférieur)
        // pour que les headings suivants du même niveau enfant soient numérotés correctement
        const platforms = getPlatformsForHeading(title) || [];
        // Filtrer les plateformes supprimées
        const activePlatforms = platforms.filter(p => {
          if (!p || (typeof p === 'string' && p.trim() === '')) return false;
          const key = getPlatformContentKey(title, p);
          return !state.deletedPlatforms[key];
        });
        // Les plateformes occupent le niveau level+1, donc on initialise ce compteur avec le nombre de plateformes
        if (activePlatforms.length > 0 && level < 5) {
          counters[level] = activePlatforms.length;
        }

        // Construire le numéro (ex: "1.2.1")
        const numParts = [];
        for(let j = 0; j < level; j++){
          numParts.push(counters[j]);
        }
        numbers.push(numParts.join('.'));
      }

      return numbers;
    };

      let sheetsTabsHtml = sheetNames.map((name, i) =>
        `<button class="sheet-tab ${i===0?'active':''}" data-sheet="${escapeHtml(name)}" style="padding:8px 16px;border:1px solid var(--border);border-radius:6px 6px 0 0;background:${i===0?'var(--panel)':'var(--bg-2)'};color:var(--text);cursor:pointer;margin-right:4px;">${escapeHtml(name)}</button>`
      ).join("");

      dialog.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h3 style="margin:0;color:var(--text);">📊 Données Excel: ${escapeHtml(data.filename)}</h3>
          <button id="closeExcelModal" style="background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;">×</button>
        </div>
        <div style="margin-bottom:12px;">
          ${sheetsTabsHtml}
        </div>
        <div id="excelSheetContent" style="border:1px solid var(--border);border-radius:0 8px 8px 8px;padding:12px;background:var(--bg-2);overflow-x:auto;">
          <!-- Sheet content will be rendered here -->
        </div>
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:flex-end;">
          <button id="closeExcelBtn" style="padding:10px 20px;border-radius:6px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);cursor:pointer;">Fermer</button>
        </div>
      `;

      modal.appendChild(dialog);
      document.body.appendChild(modal);

      // Render first sheet
      const renderSheet = (sheetName) => {
        const sheetData = data.data[sheetName];
        if(!sheetData) return;

        const container = dialog.querySelector("#excelSheetContent");
        const columns = sheetData.columns || [];
        const rows = sheetData.rows || [];

        // Calculer largeurs adaptatives
        const getColWidth = (col) => {
          const headerLen = String(col).length;
          let maxDataLen = 0;
          rows.slice(0, 50).forEach(row => {
            const val = String(row[col] === null || row[col] === undefined ? '' : row[col]);
            if (val.length > maxDataLen) maxDataLen = val.length;
          });
          const maxLen = Math.max(headerLen, maxDataLen);
          if (maxLen <= 8) return '90px';
          if (maxLen <= 15) return '130px';
          if (maxLen <= 25) return '200px';
          if (maxLen <= 40) return '280px';
          return '350px';
        };

        let tableHtml = `
          <div style="margin-bottom:10px;"><span class="xls-stats"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M3 14h18M9 4v16"/></svg><b>${rows.length}</b> lignes <span class="xls-dot"></span> <b>${columns.length}</b> colonnes</span></div>
          <table style="width:100%;border-collapse:separate;border-spacing:0;font-size:13px;">
            <thead>
              <tr style="background:linear-gradient(135deg,var(--panel) 0%,var(--panel-2) 100%);">
                ${columns.map(col => `<th style="padding:10px 12px;border-bottom:2px solid var(--accent);text-align:left;color:var(--accent);font-weight:600;min-width:${getColWidth(col)};white-space:nowrap;">${escapeHtml(String(col))}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${rows.slice(0, 100).map((row, idx) => `
                <tr style="background:${idx % 2 === 0 ? 'var(--bg)' : 'rgba(255,255,255,0.02)'};" onmouseover="this.style.background='rgba(66,153,225,0.1)'" onmouseout="this.style.background='${idx % 2 === 0 ? 'var(--bg)' : 'rgba(255,255,255,0.02)'}'">
                  ${columns.map(col => {
                    const val = row[col] === null || row[col] === undefined || row[col] === '' ? 'N/C' : row[col];
                    const isNC = val === 'N/C';
                    return `<td style="padding:8px 12px;border-bottom:1px solid var(--border);color:${isNC ? 'var(--muted)' : 'var(--text)'};font-style:${isNC ? 'italic' : 'normal'};max-width:350px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapeHtml(String(val))}">${escapeHtml(String(val))}</td>`;
                  }).join("")}
                </tr>
              `).join("")}
              ${rows.length > 100 ? `<tr><td colspan="${columns.length}" style="padding:12px;text-align:center;color:var(--muted);font-style:italic;background:rgba(0,0,0,0.1);border-top:1px dashed var(--border);">+ ${rows.length - 100} lignes supplémentaires</td></tr>` : ''}
            </tbody>
          </table>
        `;
        container.innerHTML = tableHtml;
      };

      renderSheet(sheetNames[0]);

      // Tab click handlers
      dialog.querySelectorAll(".sheet-tab").forEach(tab => {
        tab.addEventListener("click", (e) => {
          dialog.querySelectorAll(".sheet-tab").forEach(t => {
            t.classList.remove("active");
            t.style.background = "var(--bg-2)";
          });
          e.target.classList.add("active");
          e.target.style.background = "var(--panel)";
          renderSheet(e.target.getAttribute("data-sheet"));
        });
      });

      // Close handlers
      const closeModal = () => document.body.removeChild(modal);
      dialog.querySelector("#closeExcelModal").addEventListener("click", closeModal);
      dialog.querySelector("#closeExcelBtn").addEventListener("click", closeModal);
      modal.addEventListener("click", (e) => { if(e.target === modal) closeModal(); });
    }

    // ══════════════════════════════════════════════════════════════════════════
    // SYSTÈME TAGS: Modal pour sélectionner des conversations tagguées
    // ══════════════════════════════════════════════════════════════════════════
    async function showTaggedConversationsModal(headingKey, sourceFilter = null) {
      if (!state.hasTaggedData) {
        alert("Veuillez d'abord importer un dossier tagué (ZIP).");
        return;
      }

      try {
        // Récupérer la liste des conversations
        const resp = await fetch("/api/tagged-conversations");
        if (!resp.ok) throw new Error("Erreur lors du chargement des conversations");
        const data = await resp.json();

        let conversations = data.conversations || [];

        // Filtrer par source si spécifié (comparaison exacte, pas includes)
        if (sourceFilter) {
          conversations = conversations.filter(c =>
            c.source.toLowerCase() === sourceFilter.toLowerCase()
          );
        }

        if (conversations.length === 0) {
          alert("Aucune conversation trouvée" + (sourceFilter ? ` pour ${sourceFilter}` : ""));
          return;
        }

        // Liste pour suivre les conversations sélectionnées
        let selectedConversations = [];

        // Créer le modal
        const modal = document.createElement("div");
        modal.className = "tags-modal";
        modal.innerHTML = `
          <div class="tags-modal-content" style="max-width:800px;position:relative;">
            <button id="closeTagsModal" type="button" class="tm-close" title="Fermer" style="position:absolute;top:16px;right:16px;z-index:5;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
            <div class="tm-head" style="padding-right:52px;">
              <div class="tm-title">
                <span class="tm-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 0 1-11.5 7.2L3 21l1.8-6.5A8 8 0 1 1 21 12z"/></svg></span>
                <span>Conversations taguées${sourceFilter ? ` · ${sourceFilter}` : ""}<span class="tm-sub">Cochez les conversations à insérer (plusieurs possibles)</span></span>
              </div>
              <div class="tm-actions">
                <span id="convSelectionCount" class="tm-count">0 sélectionnée(s)</span>
                <button id="selectAllConv" type="button" class="tm-btn ghost">Tout sélectionner</button>
                <button id="deselectAllConv" type="button" class="tm-btn ghost">Aucun</button>
                <button id="validateConvSelection" type="button" class="tm-btn primary">Valider</button>
              </div>
            </div>
            <div id="conversationsList" style="max-height:60vh;overflow-y:auto;">
              ${conversations.map((conv, idx) => `
                <div class="tags-contact-item" data-conv-id="${escapeHtml(conv.id)}" data-conv-idx="${idx}" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border:2px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;">
                  <input type="checkbox" class="conv-checkbox" data-conv-id="${escapeHtml(conv.id)}" style="width:18px;height:18px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;" onclick="event.stopPropagation()">
                  <div style="flex:1;">
                    <div class="contact-name" style="font-weight:600;color:var(--text);">${escapeHtml(conv.contact_name)}</div>
                    <div class="contact-info" style="margin-top:4px;">
                      <span style="background:var(--accent);color:#fff;padding:2px 6px;border-radius:4px;font-size:10px;">${escapeHtml(conv.source)}</span>
                      <span style="margin-left:8px;color:var(--muted);font-size:12px;">${conv.message_count} messages</span>
                    </div>
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        `;

        document.body.appendChild(modal);

        // Fonction pour mettre à jour l'UI de sélection
        const updateConvSelectionUI = () => {
          modal.querySelector("#convSelectionCount").textContent = `${selectedConversations.length} sélectionnée(s)`;
          modal.querySelectorAll(".tags-contact-item").forEach(item => {
            const convId = item.getAttribute("data-conv-id");
            const checkbox = item.querySelector(".conv-checkbox");
            const isSelected = selectedConversations.includes(convId);
            checkbox.checked = isSelected;
            item.style.borderColor = isSelected ? "var(--accent)" : "var(--border)";
            item.style.background = isSelected ? "rgba(31,95,176,0.1)" : "transparent";
          });
        };

        // Event handlers
        const closeModal = () => document.body.removeChild(modal);
        modal.querySelector("#closeTagsModal").addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });

        // Bouton "Tout sélectionner"
        modal.querySelector("#selectAllConv").addEventListener("click", () => {
          selectedConversations = conversations.map(c => c.id);
          updateConvSelectionUI();
        });

        // Bouton "Tout désélectionner"
        modal.querySelector("#deselectAllConv").addEventListener("click", () => {
          selectedConversations = [];
          updateConvSelectionUI();
        });

        // Gestion des checkboxes
        modal.querySelectorAll(".conv-checkbox").forEach(checkbox => {
          checkbox.addEventListener("change", (e) => {
            const convId = checkbox.getAttribute("data-conv-id");
            if (checkbox.checked) {
              if (!selectedConversations.includes(convId)) {
                selectedConversations.push(convId);
              }
            } else {
              selectedConversations = selectedConversations.filter(id => id !== convId);
            }
            updateConvSelectionUI();
          });
        });

        // Click sur une conversation (toggle checkbox)
        modal.querySelectorAll(".tags-contact-item").forEach(item => {
          item.addEventListener("click", (e) => {
            if (e.target.classList.contains("conv-checkbox")) return;
            const checkbox = item.querySelector(".conv-checkbox");
            checkbox.checked = !checkbox.checked;
            checkbox.dispatchEvent(new Event("change"));
          });
        });

        // Bouton Valider - insérer toutes les conversations sélectionnées
        modal.querySelector("#validateConvSelection").addEventListener("click", async () => {
          if (selectedConversations.length === 0) {
            alert("Veuillez sélectionner au moins une conversation.");
            return;
          }

          // Animation de chargement INTEGREE dans le bouton (spinner + texte progressif).
          // S'arrete des que toutes les conversations sont generees.
          const btn = modal.querySelector("#validateConvSelection");
          const originalText = btn.textContent;
          btn.disabled = true;
          btn.style.cursor = "wait";
          btn.style.opacity = "0.85";
          const total = selectedConversations.length;
          try {
            for (let i = 0; i < total; i++) {
              btn.innerHTML = `<span class="app-spinner small" style="border-color:#fff;border-top-color:transparent;margin-right:8px;"></span>Génération ${i + 1}/${total}...`;
              await insertConversation(headingKey, selectedConversations[i]);
            }
            closeModal();
          } catch (err) {
            console.error("[TAGS] Erreur boucle insertion:", err);
            alert("Erreur lors de l'insertion: " + err.message);
          } finally {
            btn.textContent = originalText;
            btn.disabled = false;
            btn.style.cursor = "";
            btn.style.opacity = "";
          }
        });

      } catch (err) {
        console.error("[TAGS] Erreur:", err);
        alert("Erreur: " + err.message);
      }
    }

    // Overlay loading reutilisable (conversations, images, videos)
    function _showLoadingOverlay(text) {
      let el = document.getElementById('appLoadingOverlay');
      if (!el) {
        el = document.createElement('div');
        el.id = 'appLoadingOverlay';
        el.className = 'app-loading-overlay';
        el.innerHTML = '<div class="box"><div class="app-spinner"></div><span id="appLoadingText">Chargement...</span></div>';
        document.body.appendChild(el);
      }
      el.style.display = 'flex';
      const txtEl = document.getElementById('appLoadingText');
      if (txtEl) txtEl.textContent = text || 'Chargement...';
    }
    function _hideLoadingOverlay() {
      const el = document.getElementById('appLoadingOverlay');
      if (el) el.style.display = 'none';
    }

    // Insérer une conversation formatée dans un heading
    async function insertConversation(headingKey, convId) {
      try {
        // Appeler l'API pour générer les images individuelles de chaque message
        const resp = await fetch(`/api/tagged-conversation-images/${encodeURIComponent(convId)}`);
        if (!resp.ok) throw new Error("Erreur lors du chargement des images de conversation");
        const data = await resp.json();

        const messageImages = data.messages || [];
        const contactName = data.contact_name || "Contact";
        const source = data.source || "";
        const periodStart = data.period_start || "";
        const periodEnd = data.period_end || "";
        const contactInfo = data.contact_info || {};

        if (messageImages.length === 0) {
          alert("Aucun message trouvé dans cette conversation.");
          return;
        }

        // Créer le HTML pour l'interface d'édition des commentaires
        // Logique fixe: Vert (owner) = message à droite → commentaire à gauche
        //               Bleu (autre) = message à gauche → commentaire à droite
        let html = `<div class="conversation-comments-container" data-conv-id="${escapeHtml(convId)}">`;

        // Tableau récapitulatif du contact (même style que les tableaux résumés)
        const nomUtilisateur = contactInfo.nom_utilisateur || "";
        const identifiantUtilisateur = contactInfo.identifiant_utilisateur || "";
        const numeroTelephone = contactInfo.numero_telephone || "";
        const isSocialSource = contactInfo.is_social_source || false;
        const isPhoneSource = contactInfo.is_phone_source || false;
        const sourceLower = (source || "").toLowerCase();
        const isSignal = sourceLower === "signal";
        // Pour les sources sociales (Instagram, etc.), ne pas utiliser contactName comme fallback pour le pseudonyme
        // Le pseudonyme doit rester vide s'il n'est pas défini dans contactInfo - afficher "-" si vide
        const pseudonyme = isSocialSource ? (contactInfo.pseudonyme || "-") : (contactInfo.pseudonyme || contactName || "-");

        // Format de la période: date_debut Au date_fin (ou juste date_debut si un seul message)
        let periodText = 'N/A';
        if (periodStart && periodEnd) {
          periodText = `${escapeHtml(periodStart)}<br>Au<br>${escapeHtml(periodEnd)}`;

        // Construire le tableau selon le type de source

              <tbody>
