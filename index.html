            if(!state.imageTexts[key].before && !state.imageTexts[key].after){
              state.imageTexts[key].position = "none";
            }
          }
          renderPreview();
        });
      });
    }

    function setupImageDropZone(zone, onDrop){
      zone.addEventListener("dragover",(e)=>{
        e.preventDefault();
        zone.classList.add("dragover");
      });
      zone.addEventListener("dragleave",()=>{
        zone.classList.remove("dragover");
      });
      zone.addEventListener("drop",async (e)=>{
        e.preventDefault();
        zone.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        // Accepter les images classiques et les fichiers .heic/.heif
        const isImage = file && (file.type.startsWith("image/") || file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif'));
        if(isImage){
          await onDrop(file);
        }
      });
      zone.addEventListener("click",()=>{
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*,.heic,.heif";
        input.onchange = async (e)=>{
          const file = e.target.files[0];
          if(file) await onDrop(file);
        };
        input.click();
      });
    }

    async function uploadImage(file){
      try{
        const fd = new FormData();
        fd.append("file", file);
        const res = await fetch("/upload", {method:"POST", body: fd});
        const data = await res.json();
        if(!res.ok) throw new Error(data.detail||"Upload échoué");
        return data.path;
      }catch(err){
        console.error("Upload error:", err);
        state.status = "Erreur upload image";
        updateStatus();
        return null;
      }
    }

              <button type="button" id="btnEditNumserie" style="margin-top:6px;padding:4px 8px;font-size:11px;background:var(--panel-2);border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;">Modifier les n° de série</button>
              </div>`;
          } else {
            // Pas de marque/modèle sélectionné
            return `
              <div><label>${escapeHtml(phLabel(ph))}</label>
              <input data-ph="${escapeHtml(ph)}" value="" placeholder="Sélectionnez d'abord marque et modèle" readonly style="background:var(--panel-2);color:#666;cursor:not-allowed;" /></div>`;
          }
        }
        return `
        <div><label>${escapeHtml(phLabel(ph))}</label>
        <input data-ph="${escapeHtml(ph)}" value="${escapeHtml(state.values[ph]||"")}" /></div>`;
      }).join("");
      const headingNumbers = computeHeadingNumbers();
      const headingsHtml = state.headings.map((title,idx)=>{
        const choice = state.headingChoices[idx] || {mode:"auto", text:""};
        const defText = defaultPhrase(state.values);
        const blocks = state.headingContent[title] || [];
        const isDeleted = choice.mode === "none";
        const level = state.headingLevels[idx] || 1;
        const headingNum = headingNumbers[idx] || "";
        const indent = (level - 1) * 16; // Indentation en pixels

        const blocksHtml = blocks.map((block, blockIdx) => {
          if(block.type === "text"){
            return `
              <div class="content-block" draggable="true" data-block-idx="${blockIdx}" data-heading-idx="${idx}" style="padding:8px;background:var(--bg-2);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;display:flex;align-items:flex-start;gap:8px;">
                <span style="cursor:move;color:var(--muted);">☰</span>
                <span style="flex:1;font-size:12px;line-height:1.4;">${escapeHtml(fillPhrase(block.content))}</span>
                <button type="button" data-edit-block="${idx},${blockIdx}" style="padding:4px 8px;font-size:11px;">✎</button>
                <button type="button" data-remove-block="${idx},${blockIdx}" style="padding:4px 8px;font-size:11px;background:#ff4444;">×</button>
              </div>
            `;
          } else if(block.type === "image"){
            const imgWidth = block.width || state.imageWidthCm;
            return `
              <div class="content-block" draggable="true" data-block-idx="${blockIdx}" data-heading-idx="${idx}" style="padding:8px;background:var(--bg-2);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;">
                <div style="display:flex;align-items:center;gap:8px;">
                  <span style="cursor:move;color:var(--muted);">☰</span>
                  <img src="${escapeHtml(block.src)}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;" />
                  <span style="flex:1;font-size:12px;">${escapeHtml(block.src.split('/').pop())}</span>
                  <button type="button" data-edit-block="${idx},${blockIdx}" style="padding:4px 8px;font-size:11px;">⚙</button>
                  <button type="button" data-remove-block="${idx},${blockIdx}" style="padding:4px 8px;font-size:11px;background:#ff4444;">×</button>
                </div>
                <div style="display:flex;align-items:center;gap:6px;margin-top:6px;padding-left:24px;">
                  <span style="font-size:10px;color:var(--muted);">Taille:</span>
                  <input type="range" min="3" max="20" step="0.5" value="${imgWidth}" data-layout-image-width="${idx},${blockIdx}" style="flex:1;height:4px;" />
                  <span style="font-size:10px;color:var(--accent);min-width:35px;" data-layout-width-display="${idx},${blockIdx}">${imgWidth.toFixed?imgWidth.toFixed(1):imgWidth}cm</span>
                </div>
              </div>
            `;
          }
          return "";
        }).join("");

        return `
          <div class="heading-card" data-heading-card="${idx}" style="margin-bottom:14px;margin-left:${indent}px;border:1px solid ${isDeleted ? '#ff4444' : 'var(--border)'};border-radius:10px;padding:10px;${isDeleted ? 'opacity:0.6;' : ''}border-left:3px solid ${level===1?'var(--accent)':level===2?'var(--accent)':'var(--accent)'};">
            <label style="display:block;margin-bottom:6px;font-weight:600;font-size:${18-level*2}px;${isDeleted ? 'text-decoration:line-through;color:var(--red);' : ''}">
              <span style="color:var(--accent);margin-right:8px;">${escapeHtml(headingNum)}</span>${escapeHtml(title)}${isDeleted ? ' (Supprimé)' : ''}
            </label>
            <div style="display:flex;gap:8px;margin-bottom:8px;">
              ${["custom","none"].map(mode=>`
                <button type="button" data-heading="${idx}" data-mode="${mode}" style="
                  flex:1;padding:8px 10px;border-radius:8px;
                  border:1px solid ${choice.mode===mode ? (mode==="none" ? "#ff4444" : "var(--accent)") : "var(--border)"};
                  background:${choice.mode===mode ? (mode==="none" ? "rgba(255,68,68,0.15)" : "rgba(31,95,176,0.15)") : "var(--bg-2)"};
                  color:var(--text);cursor:pointer;">
                  ${mode==="custom"?"Personnalisée":"Supprimer"}
                </button>
              `).join("")}
            </div>
            ${!isDeleted?`
              <div style="margin-bottom:8px;">
                <label style="display:block;margin-bottom:6px;font-size:12px;color:var(--muted);">Phrases types :</label>
                <select data-heading-phrase="${idx}" data-heading-title="${escapeHtml(title)}" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg-2);color:var(--text);margin-bottom:8px;white-space:normal;">
                  <option value="">-- Choisir une phrase type --</option>
                  ${getPhrasesForTitle(title).map((p,i)=>`<option value="${i}">${escapeHtml(fillPhrase(p))}</option>`).join("")}
                </select>
              </div>
              <textarea data-heading-text="${idx}" rows="2" placeholder="${escapeHtml(defText)}">${escapeHtml(choice.text||"")}</textarea>

              <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">
                <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;">Contenu additionnel (${blocks.length} blocs)</div>
                <div class="blocks-container" data-heading-idx="${idx}">
                  ${blocksHtml}
                </div>
                <div style="display:flex;gap:6px;margin-top:8px;">
                  <button type="button" data-add-text-block="${idx}" style="flex:1;padding:6px;font-size:11px;background:var(--panel-2);">+ Texte</button>
                  <button type="button" data-add-image-block="${idx}" style="flex:1;padding:6px;font-size:11px;background:var(--panel-2);">+ Image</button>
                </div>
              </div>
            `:`
              <div style="font-size:12px;color:var(--red);text-align:center;padding:10px;">
                Ce titre et son contenu seront supprimés du document final
              </div>
            `}
          </div>
        `;
      }).join("");

      app.innerHTML = `
        <header>
          <div class="brand">
            <span class="logo-ring"><span class="logo-clip"><img src="logo_sin.jpg" alt="SIN" class="logo-badge" /></span></span>
            <div>
              <div class="b-title">Rapport&nbsp;Auto</div>
              <div class="b-sub"><span class="tri"><i></i><i></i><i></i></span> SIN · Ministère de la Justice</div>
            </div>
          </div>
          <div class="top-controls">
            <div class="ctl" style="min-width:180px;">
              <label>Trame active</label>
              <select id="templateSelect" class="hsel">
                ${state.templates.map(t=>`<option value="${escapeHtml(t)}" ${state.template===t?"selected":""}>${escapeHtml(tplLabel(t))}</option>`).join("")}
              </select>
            </div>
            <div class="ctl">
              <label>Données & session</label>
              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button type="button" id="importExcelBtn" class="hbtn excel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/><path d="M9 13l3 4m0-4l-3 4"/></svg><span class="lbl">Excel</span></button>
                <button type="button" id="importTagsBtn" class="hbtn tags"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v5l8.6 8.6a2 2 0 0 0 2.8 0l4.2-4.2a2 2 0 0 0 0-2.8L12 3H7a4 4 0 0 0-4 4z"/><circle cx="7.5" cy="7.5" r="1.3"/></svg><span class="lbl">Tags</span></button>
                <button type="button" id="saveStateBtn" class="hbtn save" title="Sauvegarde immédiatement tout le contenu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg><span class="lbl">Sauvegarder</span></button>
                <button type="button" id="resetAllBtn" class="hbtn danger" title="Efface tout le contenu et le cache"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg><span class="lbl">Réinitialiser</span></button>
                <span id="saveIndicator" class="save-pill" style="display:none;" title="Sauvegarde automatique de la session">
                  <span id="saveIcon" class="si-ic">
                    <svg class="ic-default" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v5h-5"/></svg>
                    <svg class="ic-saved" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                  </span>
                  <span id="saveText">Auto-sauvegarde active</span>
                </span>
              </div>
              <input type="file" id="excelFileInput" accept=".xlsx,.xls" style="display:none;" />
              <input type="file" id="tagsFileInput" accept=".zip" style="display:none;" />
            </div>
            <div class="ctl">
              <label>Phrase type — tous les titres</label>
              <div style="display:flex;gap:8px;align-items:center;">
                <select id="globalPhraseSelect" class="hsel" style="min-width:340px;max-width:42vw;">
                  <option value="">-- Choisir une phrase type --</option>
                  ${PREDEFINED_PHRASES.map((p,i)=>`<option value="${i}" ${state.globalPhraseIndex===i?"selected":""}>${escapeHtml(fillPhrase(p))}</option>`).join("")}
                </select>
                <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12.5px;white-space:nowrap;color:var(--muted);">
                  <input type="checkbox" id="showGlobalPhraseCheckbox" ${state.showDefaultPhrases?"checked":""} style="width:auto;cursor:pointer;" />
                  <span>Activer</span>
                </label>
              </div>
            </div>
          </div>
        </header>
        <div class="grid">
          <div class="panel" id="leftPanel">
            <div class="template-bar">
              ${state.templates.map((t)=>`
                <div class="template-pill ${state.template===t?"active":""}" data-template-choice="${escapeHtml(t)}">${escapeHtml(tplLabel(t))}</div>
              `).join("")}
            </div>
            <div class="panel-section-label"><span class="ix"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h11M4 12h6M4 17h9"/><circle cx="18.5" cy="7" r="2.2"/><circle cx="13.5" cy="12" r="2.2"/><circle cx="16.5" cy="17" r="2.2"/></svg></span> Variables de la trame</div>
            <form id="mainForm" class="inputs">
              <div class="fields-grid">
                ${inputsHtml}
              </div>
              ${state.headings.length?`
                <div>
                  <div class="panel-section-label" style="justify-content:space-between;">
                    <span style="display:flex;align-items:center;gap:10px;"><span class="ix">§</span> Titres &amp; contenu</span>
                    <button type="button" id="addCustomHeadingBtn" style="padding:5px 11px;font-size:11px;background:var(--panel-2);border:1px solid var(--border);border-radius:7px;color:var(--text);cursor:pointer;font-weight:600;">+ Ajouter un titre</button>
                  </div>
                  ${headingsHtml}
                </div>`:""}
              <div class="status" id="status" style="display:none;">${escapeHtml(state.status)}</div>
              <div class="export-bar">
                <button type="submit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5M12 15V3"/></svg>Exporter DOCX</button>
              </div>
            </form>
          </div>
          <div class="preview" id="rightPreview"><div id="preview"></div></div>
        </div>
      `;

      attachHandlers();
      renderPreview();

      // Restaurer les positions de scroll APRÈS tous les rendus avec un délai plus long et scrollTo forcé
      setTimeout(() => {
        const newLeftPanel = qs("#leftPanel");
        if(newLeftPanel && leftPanelScrollTop > 0) {
          newLeftPanel.scrollTop = leftPanelScrollTop;
          newLeftPanel.scrollTo({top: leftPanelScrollTop, behavior: 'instant'});
        }
        const newRightPreview = qs("#rightPreview");
        if(newRightPreview && rightPreviewScrollTop > 0) {
          newRightPreview.scrollTop = rightPreviewScrollTop;
          newRightPreview.scrollTo({top: rightPreviewScrollTop, behavior: 'instant'});
        }

        // Vérifier et réappliquer si nécessaire après un court délai
        setTimeout(() => {
          const checkLeft = qs("#leftPanel");
          const checkRight = qs("#rightPreview");
          if(checkLeft && checkLeft.scrollTop !== leftPanelScrollTop && leftPanelScrollTop > 0) {
            checkLeft.scrollTop = leftPanelScrollTop;
            checkLeft.scrollTo({top: leftPanelScrollTop, behavior: 'instant'});
          }
          if(checkRight && checkRight.scrollTop !== rightPreviewScrollTop && rightPreviewScrollTop > 0) {
            checkRight.scrollTop = rightPreviewScrollTop;
            checkRight.scrollTo({top: rightPreviewScrollTop, behavior: 'instant'});
          }
        }, 50);
      }, 10);
    }

    function attachHandlers(){
      // Gestion des blocs de contenu
      qsa("button[data-add-text-block]").forEach((btn)=>{
        btn.addEventListener("click", async (e)=>{
          e.preventDefault();
          const headingIdx = Number(btn.getAttribute("data-add-text-block"));
          const title = state.headings[headingIdx];
          const phrasesForTitle = getPhrasesForTitle(title);

          // Créer un modal personnalisé pour sélectionner une phrase type
          const modal = document.createElement("div");
          modal.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:9999;display:flex;align-items:center;justify-content:center;";

          const dialog = document.createElement("div");
          dialog.style.cssText = "background:var(--panel);padding:24px;border-radius:12px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;border:1px solid var(--border);";

          let selectedImagePath = null;

          dialog.innerHTML = `
            <h3 style="margin:0 0 16px 0;color:var(--text);">Ajouter une phrase type - ${escapeHtml(title)}</h3>
            <div style="margin-bottom:16px;">
              <label style="display:block;margin-bottom:8px;color:var(--muted);font-size:12px;">Sélectionner une phrase prédéfinie :</label>
              <select id="phraseSelector" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-2);color:var(--text);margin-bottom:12px;">
                <option value="">-- Choisir une phrase type --</option>
                ${phrasesForTitle.map((p,i)=>`<option value="${i}">${escapeHtml(fillPhrase(p))}</option>`).join("")}
                <option value="custom">✎ Personnaliser une phrase</option>
              </select>
            </div>
            <div id="customTextArea" style="display:none;margin-bottom:16px;">
              <label style="display:block;margin-bottom:8px;color:var(--muted);font-size:12px;">Texte personnalisé :</label>
              <textarea id="customText" rows="4" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-2);color:var(--text);"></textarea>
            </div>

            <div style="margin-bottom:16px;padding:12px;border:1px solid var(--border);border-radius:8px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--text);margin-bottom:12px;">
                <input type="checkbox" id="addImageCheckbox" style="width:auto;" />
                <span>Ajouter une image avec ce texte</span>
              </label>
              <div id="imageSection" style="display:none;">
                <div id="imageDropZone" style="border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;color:var(--muted);margin-bottom:12px;">
                  Cliquez ou glissez une image ici
                </div>
                <div id="imagePreviewArea" style="display:none;margin-bottom:12px;text-align:center;">
                  <img id="imagePreview" style="max-width:200px;max-height:150px;border-radius:6px;border:1px solid var(--border);" />
                  <button id="removeImageBtn" style="display:block;margin:8px auto;padding:4px 12px;font-size:12px;background:#ff4444;color:white;border:none;border-radius:4px;cursor:pointer;">Supprimer l'image</button>
                </div>
                <div style="margin-bottom:8px;">
                  <label style="display:block;margin-bottom:6px;color:var(--muted);font-size:12px;">Position du texte par rapport à l'image :</label>
                  <div style="display:flex;gap:6px;">
                    <button type="button" class="posBtn" data-pos="top" style="flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg-2);color:var(--text);cursor:pointer;">Haut</button>
                    <button type="button" class="posBtn" data-pos="bottom" style="flex:1;padding:8px;border-radius:6px;border:1px solid var(--accent);background:rgba(31,95,176,0.15);color:var(--text);cursor:pointer;">Bas</button>
                    <button type="button" class="posBtn" data-pos="left" style="flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg-2);color:var(--text);cursor:pointer;">Gauche</button>
                    <button type="button" class="posBtn" data-pos="right" style="flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg-2);color:var(--text);cursor:pointer;">Droite</button>
                  </div>
                </div>
                <div>
                  <label style="display:block;margin-bottom:6px;color:var(--muted);font-size:12px;">Taille de l'image: <span id="imageSizeValue">${state.imageWidthCm}</span> cm</label>
                  <input type="range" id="imageSizeSlider" min="3" max="20" step="0.5" value="${state.imageWidthCm}" style="width:100%;" />
                </div>
              </div>
            </div>

            <div style="display:flex;gap:12px;justify-content:flex-end;">
              <button id="cancelBtn" style="padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg-2);color:var(--text);cursor:pointer;">Annuler</button>
              <button id="confirmBtn" style="padding:10px 20px;border-radius:8px;border:none;background:linear-gradient(120deg,var(--accent),#4be1ec);color:#0b0f14;font-weight:600;cursor:pointer;">Ajouter</button>
            </div>
          `;

          modal.appendChild(dialog);
          document.body.appendChild(modal);

          const selector = dialog.querySelector("#phraseSelector");
          const customArea = dialog.querySelector("#customTextArea");
          const customText = dialog.querySelector("#customText");
          const cancelBtn = dialog.querySelector("#cancelBtn");
          const confirmBtn = dialog.querySelector("#confirmBtn");
          const addImageCheckbox = dialog.querySelector("#addImageCheckbox");
          const imageSection = dialog.querySelector("#imageSection");
          const imageDropZone = dialog.querySelector("#imageDropZone");
          const imagePreviewArea = dialog.querySelector("#imagePreviewArea");
          const imagePreview = dialog.querySelector("#imagePreview");
          const removeImageBtn = dialog.querySelector("#removeImageBtn");
          const imageSizeSlider = dialog.querySelector("#imageSizeSlider");
          const imageSizeValue = dialog.querySelector("#imageSizeValue");
          const posBtns = dialog.querySelectorAll(".posBtn");

          let selectedPosition = "bottom";
          let selectedImageSize = state.imageWidthCm;

          // Afficher/masquer la section image
          addImageCheckbox.addEventListener("change", (e)=>{
            imageSection.style.display = e.target.checked ? "block" : "none";
          });

          // Gestion du slider de taille
          imageSizeSlider.addEventListener("input", (e)=>{
            selectedImageSize = parseFloat(e.target.value);
            imageSizeValue.textContent = selectedImageSize.toFixed(1);
          });

          // Gestion des boutons de position
          posBtns.forEach(btn => {
            btn.addEventListener("click", (e)=>{
              e.preventDefault();
              selectedPosition = btn.getAttribute("data-pos");
              posBtns.forEach(b => {
                b.style.border = "1px solid var(--border)";
                b.style.background = "var(--bg-2)";
              });
              btn.style.border = "1px solid var(--accent)";
              btn.style.background = "rgba(31,95,176,0.15)";
            });
          });

          // Gestion de l'upload d'image
          const handleImageFile = async (file) => {
            if(!file || !file.type.startsWith("image/")) return;
            const uploaded = await uploadImage(file);
            if(uploaded){
              selectedImagePath = uploaded;
              imagePreview.src = uploaded;
              imageDropZone.style.display = "none";
              imagePreviewArea.style.display = "block";
            }
          };

          imageDropZone.addEventListener("click", ()=>{
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "image/*,.heic,.heif";
            input.onchange = (e) => handleImageFile(e.target.files[0]);
            input.click();
          });

          imageDropZone.addEventListener("dragover", (e)=>{
            e.preventDefault();
            imageDropZone.style.borderColor = "var(--accent)";
            imageDropZone.style.background = "rgba(31,95,176,0.1)";
          });

          imageDropZone.addEventListener("dragleave", ()=>{
            imageDropZone.style.borderColor = "var(--border)";
            imageDropZone.style.background = "";
          });

          imageDropZone.addEventListener("drop", (e)=>{
            e.preventDefault();
            imageDropZone.style.borderColor = "var(--border)";
            imageDropZone.style.background = "";
            handleImageFile(e.dataTransfer.files[0]);
          });

          removeImageBtn.addEventListener("click", ()=>{
            selectedImagePath = null;
            imageDropZone.style.display = "block";
            imagePreviewArea.style.display = "none";
          });

          // Afficher/masquer la zone de texte personnalisé
          selector.addEventListener("change", (e)=>{
            if(e.target.value === "custom"){
              customArea.style.display = "block";
              customText.value = "";
              customText.focus();
            } else if(e.target.value !== ""){
              customArea.style.display = "block";
              customText.value = phrasesForTitle[parseInt(e.target.value)];
            } else {
              customArea.style.display = "none";
            }
          });

          // Gestion des boutons
          cancelBtn.addEventListener("click", ()=>{
            document.body.removeChild(modal);
          });

          confirmBtn.addEventListener("click", ()=>{
            let text = "";
            if(selector.value === "custom" || selector.value !== ""){
              text = customText.value.trim();
            }

            if(!text){
              alert("Veuillez saisir ou sélectionner un texte");
              return;
            }

            if(!state.headingContent[title]) state.headingContent[title] = [];

            // Si une image a été ajoutée, créer un bloc image avec caption

                    reject(new Error("Réponse invalide du serveur"));

                } else {

                  }
