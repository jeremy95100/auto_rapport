                  <td contenteditable="true" data-recap-field="pseudonyme" data-conv-id="${escapeHtml(convId)}" style="padding:10px 12px;color:var(--text);border-bottom:1px solid var(--border);cursor:text;outline:none;" onfocus="this.style.background='var(--accent-soft)'" onblur="this.style.background=''">${escapeHtml(pseudonyme)}</td>
                  <td contenteditable="true" data-recap-field="identifiant_utilisateur" data-conv-id="${escapeHtml(convId)}" style="padding:10px 12px;color:var(--text);border-bottom:1px solid var(--border);cursor:text;outline:none;" onfocus="this.style.background='var(--accent-soft)'" onblur="this.style.background=''">${escapeHtml(identifiantUtilisateur || contactName)}</td>
                  <td contenteditable="true" data-recap-field="period" data-conv-id="${escapeHtml(convId)}" style="padding:10px 12px;color:var(--text);border-bottom:1px solid var(--border);cursor:text;outline:none;" onfocus="this.style.background='var(--accent-soft)'" onblur="this.style.background=''">${periodText}</td>
                </tr>
              </tbody>
            </table>
          `;
        }

        html += tableHtml;

        html += `<div style="text-align:center;font-weight:600;margin-bottom:12px;color:#333;">
          Conversation avec ${escapeHtml(contactName)} (${escapeHtml(source)})
          <div style="font-size:11px;color:#666;margin-top:4px;">💬 ${messageImages.length} message(s) - 🟢 Vert: commentaire à gauche | 🔵 Bleu: commentaire à droite</div>
        </div>`;

        for (let i = 0; i < messageImages.length; i++) {
          const msg = messageImages[i];
          const isOwner = msg.is_owner;
          // Vert (owner) → image à droite, commentaire à gauche (classe reverse)
          // Bleu (autre) → image à gauche, commentaire à droite (pas de classe reverse)
          const rowClass = isOwner ? "reverse" : "";

          // Vérifier si ce message contient des vidéos
          const videoAttachments = msg.video_attachments || [];
          const hasVideos = videoAttachments.length > 0;

          // Vérifier si ce message a des attachments avec plusieurs candidats
          const attachmentUrls = msg.attachment_urls || [];
          const multipleAttachments = attachmentUrls.filter(att => att.has_multiple);
          const hasMultipleAttachments = multipleAttachments.length > 0;

          html += `<div class="message-with-comment ${rowClass}" data-msg-idx="${i}" data-is-owner="${isOwner}">
            <div class="message-image-container">
              <img src="${escapeHtml(msg.image_url)}" alt="Message ${i + 1}" />
              ${hasMultipleAttachments ? `
                <div class="attachment-selection-controls" style="margin-top:8px;padding:8px;background:var(--accent-soft);border-radius:6px;border:1px solid var(--accent);">
                  <div style="font-size:10px;color:var(--accent);margin-bottom:6px;font-weight:600;">📎 Attachments avec plusieurs fichiers:</div>
                  ${multipleAttachments.map((att, attIdx) => `
                    <div style="margin-bottom:6px;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                      <span style="color:var(--text);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapeHtml(att.name)}">${escapeHtml(att.name)}</span>
                      <span style="color:#ffd700;font-size:9px;">(${att.candidates ? att.candidates.length : 0} fichiers)</span>
                      <button type="button"
                        class="btn-select-attachment"
                        data-attachment-name="${escapeHtml(att.name)}"
                        data-msg-idx="${i}"
                        data-conv-id="${escapeHtml(convId)}"
                        style="padding:3px 8px;font-size:9px;background:var(--accent);color:#fff;border:none;border-radius:3px;cursor:pointer;">
                        Choisir fichier
                      </button>
                    </div>
                  `).join('')}
                </div>
              ` : ''}
              ${hasVideos ? `
                <div class="video-time-controls" style="margin-top:8px;padding:8px;background:var(--panel-2);border-radius:6px;">
                  ${videoAttachments.map((vid, vidIdx) => `
                    <div style="margin-bottom:6px;font-size:10px;color:var(--muted);">
                      <div style="font-weight:600;color:var(--text);margin-bottom:4px;">🎬 ${escapeHtml(vid.name)}</div>
                      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
                        <label style="display:flex;align-items:center;gap:2px;">
                          Début: <input type="text" placeholder="00:00" data-video-start="${vidIdx}" data-msg-idx="${i}" style="width:50px;padding:2px 4px;font-size:10px;background:var(--panel-2);border:1px solid var(--border);border-radius:3px;color:#fff;">
                        </label>
                        <label style="display:flex;align-items:center;gap:2px;">
                          Fin: <input type="text" placeholder="00:30" data-video-end="${vidIdx}" data-msg-idx="${i}" style="width:50px;padding:2px 4px;font-size:10px;background:var(--panel-2);border:1px solid var(--border);border-radius:3px;color:#fff;">
                        </label>
                        <button type="button" data-regen-video="${vidIdx}" data-msg-idx="${i}" data-video-url="${escapeHtml(vid.url)}" style="padding:3px 8px;font-size:9px;background:var(--accent);color:#fff;border:none;border-radius:3px;cursor:pointer;">Régénérer</button>
                      </div>
                    </div>
                  `).join('')}
                </div>
              ` : ''}
              ${(msg.image_attachments && msg.image_attachments.length > 0) ? `
                <div class="image-attachments-preview" style="margin-top:8px;padding:8px;background:var(--accent-soft);border-radius:6px;border:1px solid #2d5a2d;">
                  <div style="font-size:10px;color:var(--accent);margin-bottom:6px;font-weight:600;">🖼️ Images attachées (${msg.image_attachments.length}):</div>
                  <div style="display:flex;flex-wrap:wrap;gap:6px;">
                    ${msg.image_attachments.map((imgAtt, imgIdx) => `
                      <div style="text-align:center;">
                        <img src="${escapeHtml(imgAtt.url)}" alt="${escapeHtml(imgAtt.name)}" style="max-width:120px;max-height:80px;border-radius:4px;border:1px solid #2d5a2d;cursor:pointer;" onclick="window.open('${escapeHtml(imgAtt.url)}', '_blank')" title="Cliquez pour agrandir"/>
                        <div style="font-size:8px;color:var(--accent);margin-top:2px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(imgAtt.name)}</div>
                      </div>
                    `).join('')}
                  </div>
                </div>
              ` : ''}
              ${(msg.pdf_attachments && msg.pdf_attachments.length > 0) ? `
                <div class="pdf-attachments-preview" style="margin-top:8px;padding:8px;background:var(--red-soft);border-radius:6px;border:1px solid #5a2d2d;">
                  <div style="font-size:10px;color:#FFB6C1;margin-bottom:6px;font-weight:600;">📄 PDFs attachés (${msg.pdf_attachments.length}):</div>
                  <div style="display:flex;flex-wrap:wrap;gap:6px;">
                    ${msg.pdf_attachments.map((pdfAtt, pdfIdx) => `
                      <div style="text-align:center;">
                        <img src="${escapeHtml(pdfAtt.url)}" alt="${escapeHtml(pdfAtt.name)}" style="max-width:120px;max-height:80px;border-radius:4px;border:1px solid #5a2d2d;cursor:pointer;" onclick="window.open('${escapeHtml(pdfAtt.url)}', '_blank')" title="Cliquez pour agrandir"/>
                        <div style="font-size:8px;color:#FFB6C1;margin-top:2px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(pdfAtt.name)}</div>
                      </div>
                    `).join('')}
                  </div>
                </div>
              ` : ''}
            </div>
            <div class="message-comment-container">
              <div style="font-size:10px;color:${isOwner ? '#25D366' : '#0084ff'};margin-bottom:4px;font-weight:600;">
                ${isOwner ? '🟢 Utilisateur' : '🔵 Contact'}
              </div>
              <textarea placeholder="Ajouter un commentaire..." data-msg-idx="${i}"></textarea>
            </div>
          </div>`;
        }

        html += `</div>`;

        // Ajouter au contenu du heading avec les données des images
        if (!state.headingContent[headingKey]) {
          state.headingContent[headingKey] = [];
        }
        state.headingContent[headingKey].push({
          type: "conversation",
          content: html,
          convId: convId,
          contactName: contactName,
          source: source,
          periodStart: periodStart,
          periodEnd: periodEnd,
          contactInfo: contactInfo,
          messageImages: messageImages.map((msg, idx) => ({
            image_path: msg.image_path,                  // bulle FULL (preview)
            image_path_clean: msg.image_path_clean || "", // bulle CLEAN (docx, miniatures hors bulle)
            image_url: msg.image_url,
            is_owner: msg.is_owner,
            from_user: msg.from_user,
            body: msg.body,
            timestamp: msg.timestamp,
            video_attachments: msg.video_attachments || [],
            attachment_urls: msg.attachment_urls || [],  // Attachments avec info candidats multiples
            image_attachments: msg.image_attachments || [],  // Images séparées des bulles
            pdf_attachments: msg.pdf_attachments || [],  // PDFs séparés des bulles
            comment: "",
            // Position fixe: owner (vert) → gauche, autre (bleu) → droite
            comment_position: msg.is_owner ? "left" : "right"
          }))
        });

        renderLayout();
        renderPreview();

        // Attacher les événements pour les commentaires après le render
        setTimeout(() => {
          attachConversationCommentHandlers(headingKey, convId);
        }, 100);

      } catch (err) {
        console.error("[TAGS] Erreur insertion conversation:", err);
        alert("Erreur: " + err.message);
      }
    }

    // Attacher les gestionnaires d'événements pour les commentaires de conversation
    function attachConversationCommentHandlers(headingKey, convId) {
      const container = document.querySelector(`.conversation-comments-container[data-conv-id="${convId}"]`);
      if (!container) return;

      // Trouver le bloc de conversation dans state.headingContent
      const blocks = state.headingContent[headingKey] || [];
      const convBlock = blocks.find(b => b.type === "conversation" && b.convId === convId);
      if (!convBlock || !convBlock.messageImages) return;

      // Gestionnaire pour les textareas de commentaires
      container.querySelectorAll("textarea[data-msg-idx]").forEach(textarea => {
        textarea.addEventListener("input", (e) => {
          const msgIdx = parseInt(e.target.getAttribute("data-msg-idx"));
          if (convBlock.messageImages[msgIdx]) {
            convBlock.messageImages[msgIdx].comment = e.target.value;
          }
        });
      });

      // Gestionnaire pour régénérer les miniatures vidéo avec temps personnalisé
      container.querySelectorAll("button[data-regen-video]").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          const vidIdx = parseInt(btn.getAttribute("data-regen-video"));
          const msgIdx = parseInt(btn.getAttribute("data-msg-idx"));
          const videoUrl = btn.getAttribute("data-video-url");

          // Récupérer les valeurs de temps
          const startInput = container.querySelector(`input[data-video-start="${vidIdx}"][data-msg-idx="${msgIdx}"]`);
          const endInput = container.querySelector(`input[data-video-end="${vidIdx}"][data-msg-idx="${msgIdx}"]`);
          const startTime = startInput?.value || null;
          const endTime = endInput?.value || null;

          btn.textContent = "...";
          btn.disabled = true;

          try {
            const resp = await fetch("/api/video-thumbnails", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                video_url: videoUrl,
                start_time: startTime,
                end_time: endTime
              })
            });

            if (!resp.ok) throw new Error("Erreur génération miniatures");
            const data = await resp.json();

            if (data.thumbnails && data.thumbnails.length > 0) {
              // Mettre à jour les miniatures dans le state
              if (convBlock.messageImages[msgIdx]?.video_attachments?.[vidIdx]) {
                convBlock.messageImages[msgIdx].video_attachments[vidIdx].thumbnails = data.thumbnails;
              }
              alert(`✅ ${data.thumbnails.length} miniatures régénérées! Réinsérez la conversation pour voir les changements.`);
            }
          } catch (err) {
            console.error("[VIDEO] Erreur régénération:", err);
            alert("Erreur: " + err.message);
          } finally {
            btn.textContent = "Régénérer";
            btn.disabled = false;
          }
        });
      });

      // Note: Le gestionnaire pour les boutons .btn-select-attachment est maintenant
      // géré globalement via délégation d'événements (voir document.addEventListener)
    }

    // ===== Modal conversation plein écran (découplé de renderPreview) =====
    // Construit le modal une seule fois dans le <body> au clic sur "Ouvrir la conversation".
    // Avantage : ouverture instantanée (pas de reconstruction de tout l'aperçu) et le modal
    // n'est jamais recréé par un rendu en arrière-plan -> plus de pulsation/freeze.
    function closeConversationModal() {
      document.querySelectorAll('.conv-modal[data-conv-modal]').forEach(el => el.remove());
      if (closeConversationModal._esc) {
        document.removeEventListener('keydown', closeConversationModal._esc);
        closeConversationModal._esc = null;
      }
      state.openConv = null;
    }

    function openConversationModal(openKey) {
      if (!openKey) return;
      const sep = openKey.lastIndexOf('|');
      if (sep < 0) return;
      const headingKey = openKey.slice(0, sep);
      const blockIdx = Number(openKey.slice(sep + 1));
      const blocks = state.headingContent[headingKey] || [];
      const block = blocks[blockIdx];
      if (!block || block.type !== 'conversation') return;

      closeConversationModal(); // un seul modal à la fois
      state.openConv = openKey;

      const convName = block.contactName || 'Inconnu';
      const convInitials = convName.trim().split(/\s+/).map(w => w[0] || '').join('').slice(0, 2).toUpperCase() || '?';
      const convSource = block.source ? block.source : 'Messagerie';
      const msgCount = Array.isArray(block.messageImages) ? block.messageImages.length : 0;

      const modal = document.createElement('div');
      modal.className = 'conv-modal';
      modal.setAttribute('data-conv-modal', '');
      modal.innerHTML = `
        <div class="conv-modal-panel">
          <div class="conv-modal-head">
            <span class="pa-back">‹</span>
            <span class="cm-avatar">${escapeHtml(convInitials)}</span>
            <div class="cm-meta">
              <div class="cm-name">${escapeHtml(convName)}</div>
              <div class="cm-sub">${escapeHtml(convSource)} · ${msgCount} message${msgCount > 1 ? 's' : ''}</div>
            </div>
            <button type="button" data-close-conv class="cm-close" title="Fermer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
          </div>
          <div class="conv-modal-body">${block.content}</div>
        </div>`;
      document.body.appendChild(modal);

      // Fermeture : croix, clic sur l'overlay, touche Échap
      modal.querySelector('[data-close-conv]').addEventListener('click', closeConversationModal);
      modal.addEventListener('click', (e) => { if (e.target === modal) closeConversationModal(); });
      closeConversationModal._esc = (e) => { if (e.key === 'Escape') closeConversationModal(); };
      document.addEventListener('keydown', closeConversationModal._esc);

      // Brancher les handlers (commentaires, régénération vidéo, tableau récap éditable)
      attachConversationModalHandlers(modal, headingKey, block);
    }

    function attachConversationModalHandlers(modal, headingKey, block) {
      const container = modal.querySelector('.conversation-comments-container');
      if (!container) return;
      // Restaurer les valeurs des commentaires depuis le state
      if (Array.isArray(block.messageImages)) {
        block.messageImages.forEach((msg, idx) => {
          const ta = container.querySelector(`textarea[data-msg-idx="${idx}"]`);
          if (ta && msg.comment != null && ta.value !== msg.comment) ta.value = msg.comment;
        });
      }
      // Handlers commentaires + régénération vidéo (cible le container via convId)
      if (block.convId) attachConversationCommentHandlers(headingKey, block.convId);
      // Tableau récapitulatif éditable : restaurer + persister
      if (!block.contactInfo) block.contactInfo = {};
      container.querySelectorAll('[data-recap-field]').forEach(cell => {
        const field = cell.getAttribute('data-recap-field');
        const stateKey = field === 'period' ? 'period_text' : field;
        const saved = block.contactInfo[stateKey];
        if (saved !== undefined && saved !== null && cell.innerText !== saved) cell.innerText = saved;
        cell.addEventListener('blur', () => {
          block.contactInfo[stateKey] = (cell.innerText || '').trim();
          if (typeof saveStateToLocalStorage === 'function' && state._initComplete) saveStateToLocalStorage();
        });
      });
    }

    // Modal de sélection d'attachment parmi plusieurs candidats
    function openAttachmentSelectionModal(candidates, attachmentName, msgIdx, convId, headingKey, convBlock, isVideoFromApi = false) {
      // Fermer un éventuel modal existant
      const existingModal = document.querySelector(".attachment-selection-modal");
      if (existingModal) existingModal.remove();

      // Bloquer le scroll du body quand le modal est ouvert
      const originalOverflow = document.body.style.overflow;
      document.body.style.overflow = "hidden";

      // Créer le modal
      const modal = document.createElement("div");
      modal.className = "attachment-selection-modal";
      // z-index AU-DESSUS du modal de conversation (100002) : le bouton "Choisir fichier" est
      // dans la conversation ouverte, donc les suggestions doivent passer DEVANT, sinon elles
      // s'ouvrent derrière et restent invisibles (problème d'affichage signalé).
      modal.style.cssText = `
        position:fixed;top:0;left:0;right:0;bottom:0;
        background:rgba(0,0,0,0.85);z-index:100010;
        display:flex;align-items:center;justify-content:center;
        padding:20px;overflow-y:auto;
      `;

      // Déterminer le type de fichier (image ou vidéo) - utiliser l'info API si disponible
      const firstCandidate = candidates[0];
      const isImage = /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(firstCandidate.original_path || attachmentName || '');
      const isVideo = isVideoFromApi || /\.(mp4|mov|avi|mkv|webm|m4v|3gp)$/i.test(firstCandidate.original_path || attachmentName || '');

      modal.innerHTML = `
        <div style="background:var(--panel-2);border-radius:12px;max-width:900px;max-height:90vh;overflow:auto;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.5);">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:12px;">
            <h3 style="margin:0;color:#fff;font-size:16px;">📎 Sélectionner le bon fichier</h3>
            <button class="close-modal" style="background:none;border:none;color:#888;font-size:24px;cursor:pointer;padding:0;">&times;</button>
          </div>
          <div style="color:var(--muted);margin-bottom:16px;font-size:12px;">
            <strong>${candidates.length}</strong> fichiers trouvés pour: <span style="color:#ffd700;">${escapeHtml(attachmentName)}</span>
          </div>
          <div class="candidates-grid" style="display:grid;grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));gap:16px;">
            ${candidates.map((cand, idx) => `
              <div class="candidate-card" data-idx="${idx}" style="
                background:var(--panel-2);border-radius:8px;padding:12px;cursor:pointer;
                border:2px solid transparent;transition:all 0.2s;
              " onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='transparent'">
                <div style="height:150px;background:var(--panel-2);border-radius:6px;margin-bottom:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;">
                  ${isImage ? `
                    <img src="${escapeHtml(cand.url)}" alt="Aperçu" style="max-width:100%;max-height:100%;object-fit:contain;">
                  ` : isVideo ? `
                    ${cand.thumbnail ? `
                      <img src="${escapeHtml(cand.thumbnail)}" alt="Miniature vidéo" style="max-width:100%;max-height:100%;object-fit:contain;">
                      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.6);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;">
                        <span style="color:#fff;font-size:18px;margin-left:3px;">▶</span>
                      </div>
                    ` : `
                      <video src="${escapeHtml(cand.url)}" style="max-width:100%;max-height:100%;" muted preload="none" poster=""></video>
                    `}
                  ` : `
                    <div style="color:#666;font-size:40px;">📄</div>
                  `}
                </div>
                <div style="font-size:11px;color:#888;word-break:break-all;">
                  <div style="color:var(--text);font-weight:600;margin-bottom:4px;">📁 Dossier:</div>
                  <div style="background:var(--panel-2);padding:6px;border-radius:4px;max-height:60px;overflow:auto;">
                    ${escapeHtml(cand.source_folder || 'Racine')}
                  </div>
                </div>
                <button type="button" class="btn-select-candidate" data-idx="${idx}" style="
                  margin-top:10px;width:100%;padding:8px;font-size:11px;
                  background:var(--accent);color:#fff;border:none;border-radius:4px;
                  cursor:pointer;font-weight:600;
                ">✓ Sélectionner</button>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      document.body.appendChild(modal);

      // Fonction de fermeture du modal (restaure le scroll)
      const closeModal = () => {
        document.body.style.overflow = originalOverflow || "";
        modal.remove();
      };

      // Gestionnaire fermeture
      modal.querySelector(".close-modal").addEventListener("click", closeModal);
      modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModal();
      });

      // Fermer avec Escape
      const handleEscape = (e) => {
        if (e.key === "Escape") {
          closeModal();
          document.removeEventListener("keydown", handleEscape);
        }
      };
      document.addEventListener("keydown", handleEscape);

      // Gestionnaire sélection
      modal.querySelectorAll(".btn-select-candidate").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          const idx = parseInt(btn.getAttribute("data-idx"));
          const selectedCandidate = candidates[idx];

          // Mettre à jour l'attachment URL dans le state
          if (convBlock && convBlock.messageImages && convBlock.messageImages[msgIdx]) {
            const attachmentUrls = convBlock.messageImages[msgIdx].attachment_urls || [];
            const attToUpdate = attachmentUrls.find(a => a.name === attachmentName);
            if (attToUpdate) {
              attToUpdate.url = selectedCandidate.url;
              attToUpdate.selected_candidate = selectedCandidate;
              console.log(`[ATTACH] Candidat sélectionné pour ${attachmentName}:`, selectedCandidate.url);
            }
          }

          // Régénérer l'image du message avec le nouvel attachment
          btn.textContent = "⏳ Mise à jour...";
          btn.disabled = true;

          try {
            // Appeler l'API pour régénérer l'image du message avec le bon attachment
            const payload = {
              conv_id: convId,
              msg_idx: msgIdx,
              attachment_name: attachmentName,
              new_url: selectedCandidate.url
            };
            console.log("[ATTACH UPDATE] Envoi vers API:", payload);
            const resp = await fetch("/api/update-message-attachment", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });

            if (!resp.ok) throw new Error("Erreur mise à jour attachment");
            const result = await resp.json();

            if (result.success && result.new_image_url) {
              // Mettre à jour l'image dans le DOM
              const container = document.querySelector(`.conversation-comments-container[data-conv-id="${convId}"]`);
              if (container) {
                const msgDiv = container.querySelector(`.message-with-comment[data-msg-idx="${msgIdx}"]`);
                if (msgDiv) {
                  const img = msgDiv.querySelector(".message-image-container > img");
                  if (img) {
                    img.src = result.new_image_url + "?t=" + Date.now();  // Cache bust
                  }

                  // Mettre à jour l'affichage des images attachées dans le DOM
                  if (result.image_attachments && result.image_attachments.length > 0) {
                    let imgPreview = msgDiv.querySelector(".image-attachments-preview");
                    if (!imgPreview) {
                      // Créer le conteneur s'il n'existe pas
                      const imgContainer = msgDiv.querySelector(".message-image-container");
                      if (imgContainer) {
                        imgPreview = document.createElement("div");
                        imgPreview.className = "image-attachments-preview";

    // Fonction pour extraire le chemin depuis Meta Data si Path est vide
    function extractPathFromMetaData(metaData) {
      if (!metaData || metaData === "nan") return "";
      const match = metaData.match(/File path:([^\n\r]+)/i);
      if (match) {
        return match[1].trim();
      }
      return "";
    }

    // Fonction pour formater la date de création
    function formatCreatedDateTime(date, time) {
      let result = "";

      // Nettoyer la date
      let cleanDate = date;
      if (cleanDate && cleanDate !== "nan") {
        // Ignorer si c'est un numéro de série Excel (ex: 45849.18085648148)
        if (/^\d+(\.\d+)?$/.test(cleanDate.trim())) {
          cleanDate = ""; // Ignorer le numéro de série, on utilisera time à la place
        }
        // Si la date contient un T (format ISO), extraire juste la date et l'heure
        else if (cleanDate.includes("T")) {
          const parts = cleanDate.split("T");
          const datePart = parts[0]; // 2024-01-15
          const timePart = parts[1] ? parts[1].split(".")[0] : ""; // 10:30:00 (sans millisecondes)
          // Convertir en format classique DD/MM/YYYY HH:MM:SS
          const dateMatch = datePart.match(/(\d{4})-(\d{2})-(\d{2})/);
          if (dateMatch) {
            cleanDate = `${dateMatch[3]}/${dateMatch[2]}/${dateMatch[1]}`;
            if (timePart) cleanDate += ` ${timePart}`;
          }
          // Ne pas ajouter time si déjà inclus dans la date
          return cleanDate || "Non disponible";
        }
      }

      if (cleanDate && cleanDate !== "nan") result += cleanDate;
      if (time && time !== "nan") {
        if (result) result += " ";
        result += time;
      }
      return result || "Non disponible";
    }

    // Fonction pour nettoyer le chemin (enlever le premier mot avant le premier /)
    function cleanFilePath(path) {
      if (!path || path === "nan" || path === "") return "";
      // Enlever le premier segment avant le premier / mais GARDER le /
      const slashIndex = path.indexOf('/');
      if (slashIndex !== -1 && slashIndex < path.length - 1) {
        return path.substring(slashIndex); // Garder le / au début
      }
      // Si pas de slash ou slash à la fin, retourner tel quel
      return path;
    }

                <button id="selectAllMedia" type="button" class="tm-btn ghost">Tout sélectionner</button>

                <button id="closeTagsModal" type="button" class="tm-close" title="Fermer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>

                    `<div style="margin-top:24px;color:var(--muted);">${escapeHtml(item.name)}</div>`}
                  </div>

                  <!-- Informations et Observations -->
                  <div class="tm-info">
                    <div class="tm-name">${escapeHtml(item.name)}</div>
                    <div class="tm-meta">
                      <span class="tm-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>${escapeHtml(item.extractedPath) || "Chemin non disponible"}</span></span>
                      <span class="tm-chip date"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span>${escapeHtml(item.createdDateTime) || "—"}</span></span>
